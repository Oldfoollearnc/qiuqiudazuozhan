<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>球球大作战</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;overflow:hidden;font-family:'Microsoft YaHei',Arial,sans-serif;user-select:none;-webkit-user-select:none}
canvas{display:block;cursor:none}
#ui{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
#score{position:absolute;top:15px;left:50%;transform:translateX(-50%);color:#fff;font-size:22px;font-weight:bold;text-shadow:0 0 15px rgba(0,0,0,.9);letter-spacing:1px}
#buffBar{position:absolute;top:44px;left:50%;transform:translateX(-50%);display:flex;gap:3px;align-items:center;pointer-events:auto;z-index:12;display:none}
#buffBar .tag{font-size:10px;color:rgba(255,255,255,.25);margin-right:4px}
#buffBar .b{display:inline-flex;align-items:center;gap:2px;padding:1px 6px;border-radius:8px;font-size:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);color:rgba(255,255,255,.7);white-space:nowrap}
#buffBar .b.t2{border-color:rgba(255,215,0,.2);color:#ffd700}
#buffBar .b .ic{font-size:11px}
#buffBar .more{font-size:9px;color:rgba(255,255,255,.2);padding:1px 5px;background:rgba(255,255,255,.03);border-radius:6px}
#buffBar .cd{font-size:10px;color:rgba(255,255,255,.2);margin-left:4px;padding:1px 5px;border-radius:6px;background:rgba(255,255,255,.03)}
#escHint{position:absolute;top:12px;left:12px;color:rgba(255,255,255,.15);font-size:11px;z-index:12;display:none;letter-spacing:.5px;text-shadow:0 0 10px rgba(0,0,0,.5)}
#leaderboard{position:absolute;top:15px;right:15px;color:#fff;font-size:13px;text-align:right;text-shadow:0 0 8px rgba(0,0,0,.9);pointer-events:auto;min-width:140px;background:rgba(0,0,0,.4);border-radius:8px;padding:8px 12px;backdrop-filter:blur(4px)}
#leaderboard .title{font-weight:bold;margin-bottom:4px;font-size:15px;color:#ffd700}
#leaderboard .entry{margin:2px 0;padding:1px 0;border-bottom:1px solid rgba(255,255,255,.05)}
#leaderboard .me{color:#ffd700;font-weight:bold}
#leaderboard .me::before{content:'► '}
#killFeed{position:absolute;top:55px;left:50%;transform:translateX(-50%);text-align:center;z-index:11;pointer-events:none}
#killFeed .msg{color:#fff;font-size:14px;padding:4px 16px;margin:3px;border-radius:20px;background:rgba(0,0,0,.6);white-space:nowrap;display:inline-block;animation:fadeKill 3s ease-out forwards}
@keyframes fadeKill{0%{opacity:1;transform:translateY(0)}70%{opacity:1}100%{opacity:0;transform:translateY(-30px)}}
#levelDisplay{position:absolute;bottom:15px;left:15px;color:rgba(255,255,255,.7);font-size:12px;text-shadow:0 0 8px rgba(0,0,0,.9)}
#chatPanel{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);pointer-events:none;display:none;z-index:12}
#chatPanel.open{display:block}
#chatPanel .hint{color:rgba(255,255,255,.7);font-size:13px;text-align:center;text-shadow:0 0 8px rgba(0,0,0,.9);background:rgba(0,0,0,.5);padding:6px 18px;border-radius:20px;white-space:nowrap;backdrop-filter:blur(4px)}
#chatPanel .hint kbd{display:inline-block;padding:1px 5px;border-radius:3px;background:rgba(255,255,255,.15);color:#fff;font-size:11px;border:none;margin:0 2px}
#startScreen{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;background:rgba(8,8,16,.55);z-index:100;overflow:hidden}
#startScreen::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;
  background:radial-gradient(ellipse at 25% 20%,rgba(78,204,163,.06) 0,transparent 50%),
             radial-gradient(ellipse at 75% 60%,rgba(108,92,231,.04) 0,transparent 50%),
             radial-gradient(ellipse at 50% 80%,rgba(255,107,107,.03) 0,transparent 50%);
  animation:breathe 10s ease-in-out infinite;z-index:0}

#startScreen .floating-ball{position:absolute;border-radius:50%;pointer-events:none;z-index:0;opacity:.06}
#startScreen .floating-ball:nth-child(1){width:60px;height:60px;background:radial-gradient(circle at 30% 30%,#4ecca3,#1a6b4e);top:8%;left:12%;animation:fbFloat 18s ease-in-out infinite}
#startScreen .floating-ball:nth-child(2){width:40px;height:40px;background:radial-gradient(circle at 30% 30%,#6bcbff,#2d6b9e);top:25%;right:15%;animation:fbFloat 22s ease-in-out infinite reverse}
#startScreen .floating-ball:nth-child(3){width:80px;height:80px;background:radial-gradient(circle at 30% 30%,#ff8fe8,#8f3d7a);bottom:20%;right:20%;animation:fbFloat 20s ease-in-out infinite}
#startScreen .floating-ball:nth-child(4){width:35px;height:35px;background:radial-gradient(circle at 30% 30%,#ffd93d,#b8941a);bottom:35%;left:8%;animation:fbFloat 25s ease-in-out infinite reverse}
#startScreen .floating-ball:nth-child(5){width:50px;height:50px;background:radial-gradient(circle at 30% 30%,#ff6b6b,#b83a3a);top:60%;left:20%;animation:fbFloat 16s ease-in-out infinite}
#startScreen .floating-ball:nth-child(6){width:45px;height:45px;background:radial-gradient(circle at 30% 30%,#a29bfe,#5a4f9e);top:15%;right:35%;animation:fbFloat 24s ease-in-out infinite reverse}

@keyframes breathe{0%,100%{transform:scale(1) rotate(0deg)}50%{transform:scale(1.08) rotate(1deg)}}
@keyframes fbFloat{0%,100%{transform:translate(0,0) scale(1)}25%{transform:translate(60px,-40px) scale(1.1)}50%{transform:translate(-30px,50px) scale(.95)}75%{transform:translate(-50px,-30px) scale(1.05)}}

#startScreen .panel{position:relative;z-index:1;background:rgba(255,255,255,.03);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.06);border-radius:28px;padding:38px 48px 30px;width:400px;max-width:92vw;display:flex;flex-direction:column;align-items:center;box-shadow:0 24px 80px rgba(0,0,0,.6)}
#startScreen .logo{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#4ecca3,#36b37e);display:flex;align-items:center;justify-content:center;font-size:32px;margin-bottom:10px;box-shadow:0 0 30px rgba(78,204,163,.2);animation:logoGlow 3s ease-in-out infinite}
@keyframes logoGlow{0%,100%{box-shadow:0 0 30px rgba(78,204,163,.2)}50%{box-shadow:0 0 50px rgba(78,204,163,.4)}}
#startScreen h1{font-size:44px;margin-bottom:2px;font-weight:900;background:linear-gradient(135deg,#4ecca3 0%,#6bcbff 50%,#a29bfe 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 25px rgba(78,204,163,.25));letter-spacing:1px;animation:titlePulse 4s ease-in-out infinite}
@keyframes titlePulse{0%,100%{filter:drop-shadow(0 0 25px rgba(78,204,163,.25))}50%{filter:drop-shadow(0 0 45px rgba(78,204,163,.4))}}
#startScreen .subtitle{color:rgba(255,255,255,.35);font-size:13px;margin-bottom:20px;font-weight:300;letter-spacing:3px}
#startScreen .divider{width:60px;height:1.5px;background:linear-gradient(90deg,transparent,rgba(78,204,163,.4),transparent);margin-bottom:18px;border-radius:2px}
#startScreen input{pointer-events:auto;padding:11px 22px;font-size:15px;border:1px solid rgba(255,255,255,.08);border-radius:16px;background:rgba(255,255,255,.05);color:#fff;text-align:center;outline:none;margin-bottom:12px;width:220px;transition:all .35s;font-family:inherit;letter-spacing:.5px}
#startScreen input:focus{border-color:rgba(78,204,163,.4);box-shadow:0 0 30px rgba(78,204,163,.06),inset 0 0 30px rgba(78,204,163,.03);background:rgba(255,255,255,.07)}
#startScreen input::placeholder{color:rgba(255,255,255,.2)}
.color-picker{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;justify-content:center}
.color-picker .c{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .25s;pointer-events:auto;position:relative}
.color-picker .c:hover{transform:scale(1.3);z-index:2;border-color:rgba(255,255,255,.3)}
.color-picker .c.sel{border-color:#fff;transform:scale(1.2);box-shadow:0 0 14px rgba(255,255,255,.3)}
.skin-picker{display:flex;gap:5px;margin-bottom:12px;justify-content:center;flex-wrap:wrap}
.skin-picker .s{pointer-events:auto;padding:4px 10px;font-size:11px;border-radius:10px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.03);color:rgba(255,255,255,.4);cursor:pointer;transition:all .25s;font-family:inherit}
.skin-picker .s.sel{border-color:rgba(78,204,163,.4);color:#4ecca3;background:rgba(78,204,163,.08);box-shadow:0 0 16px rgba(78,204,163,.06)}
.skin-picker .s:hover{border-color:rgba(255,255,255,.15);color:rgba(255,255,255,.6)}
#skinPreview{display:block;margin:4px auto 8px;border-radius:12px;background:rgba(255,255,255,.02);width:120px;height:120px;pointer-events:none}
.skin-level{color:rgba(255,215,0,.4);font-size:10px;margin-bottom:4px;min-height:14px;letter-spacing:1px}
.btn-start{pointer-events:auto;padding:12px 56px;font-size:16px;border:none;border-radius:16px;color:#000;cursor:pointer;font-weight:700;background:linear-gradient(135deg,#4ecca3,#36b37e);transition:all .3s;position:relative;overflow:hidden;letter-spacing:.5px;margin-bottom:4px}
.btn-start:hover{transform:translateY(-3px);box-shadow:0 10px 35px rgba(78,204,163,.35)}
.btn-start:active{transform:translateY(-1px)}
.btn-start::after{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle,rgba(255,255,255,.12) 0,transparent 60%);opacity:0;transition:opacity .5s}
.btn-start:hover::after{opacity:1}
#startScreen .rank{color:rgba(255,215,0,.5);font-size:13px;margin-top:4px;font-weight:300;letter-spacing:1px}
#startScreen .controls-hint{color:rgba(255,255,255,.2);margin-top:10px;font-size:11px;line-height:2;text-align:center}
#startScreen .controls-hint kbd{display:inline-block;padding:0 5px;border-radius:4px;background:rgba(255,255,255,.05);color:rgba(255,255,255,.35);font-size:10px;border:none;font-family:inherit}
#settingsBtn{pointer-events:auto;background:none;border:none;color:rgba(255,255,255,.15);font-size:12px;cursor:pointer;margin-top:2px;padding:5px 12px;border-radius:10px;transition:all .25s;position:relative;z-index:1}
#settingsBtn:hover{color:rgba(255,255,255,.4);background:rgba(255,255,255,.04)}
#settingsPanel{pointer-events:auto;max-height:0;overflow:hidden;transition:max-height .35s ease,margin .35s ease;width:100%;margin-top:0}
#settingsPanel.open{max-height:220px;margin-top:4px}
#settingsPanel .row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;margin:0}
#settingsPanel .row label{color:rgba(255,255,255,.4);font-size:12px}
#settingsPanel .row select{background:rgba(0,0,0,.4);color:rgba(255,255,255,.9);border:1px solid rgba(255,255,255,.12);border-radius:6px;padding:3px 8px;font-size:11px;outline:none;font-family:inherit;transition:all .2s;cursor:pointer}
#settingsPanel .row select option{background:#1a1a2e;color:#fff}
#settingsPanel .row select:focus{border-color:rgba(78,204,163,.5)}
.toggle-switch{position:relative;width:36px;height:20px;cursor:pointer}
.toggle-switch input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;top:0;left:0;right:0;bottom:0;background:#444;border-radius:10px;transition:.3s}
.toggle-slider::before{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:2px;left:2px;transition:.3s}
.toggle-switch input:checked+.toggle-slider{background:#4ecca3}
.toggle-switch input:checked+.toggle-slider::before{transform:translateX(16px)}
#deathScreen{position:fixed;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;justify-content:center;align-items:center;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);z-index:99;padding:20px}
#deathScreen h1{color:#ff6b6b;font-size:38px;margin-bottom:2px}
#deathScreen .sub{color:#aaa;font-size:15px;margin-bottom:10px}
#deathScreen .stats{color:#fff;font-size:16px;margin-bottom:2px}
#deathScreen .stats span{color:#ffd700}
#deathScreen .exp-gain{color:#ffd700;font-size:15px;margin-bottom:8px}
#deathScreen .achieve{color:#4ecca3;font-size:13px;margin:1px}
#deathScreen .btn-group{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap;justify-content:center}
#deathScreen button{pointer-events:auto;padding:10px 30px;font-size:16px;border:none;border-radius:25px;color:#000;cursor:pointer;font-weight:bold;transition:transform .15s;background:linear-gradient(135deg,#4ecca3,#36b37e)}
#deathScreen button:hover{transform:scale(1.05)}
#deathScreen button.btn-sec{background:rgba(255,255,255,.1);color:#ccc}
#deathScreen button.btn-sec:hover{background:rgba(255,255,255,.2)}
#spectateHint{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.4);font-size:12px;z-index:11;pointer-events:none}
#pauseScreen{position:fixed;top:0;left:0;width:100%;height:100%;display:none;z-index:85;align-items:center;justify-content:center}
#pauseScreen.open{display:flex}
.pause-panel{position:relative;z-index:1;background:rgba(15,15,30,.92);border:1px solid rgba(255,255,255,.06);border-radius:24px;padding:32px 40px 24px;max-width:320px;width:80vw;box-shadow:0 24px 80px rgba(0,0,0,.7);text-align:center}
.pause-title{font-size:28px;font-weight:900;color:#fff;margin-bottom:20px}
.pause-btns{display:flex;flex-direction:column;gap:8px}
.pause-btn{pointer-events:auto;padding:10px 20px;font-size:14px;border:none;border-radius:12px;color:#ccc;cursor:pointer;font-weight:600;transition:all .25s;background:rgba(255,255,255,.05);font-family:inherit}
.pause-btn:hover{background:rgba(255,255,255,.1);color:#fff;transform:translateY(-2px)}
.pause-btn.primary{background:linear-gradient(135deg,#4ecca3,#36b37e);color:#000}
.pause-btn.primary:hover{box-shadow:0 6px 20px rgba(78,204,163,.3)}
.pause-btn.quit{color:rgba(255,100,100,.7)}
.pause-btn.quit:hover{background:rgba(255,50,50,.1);color:#ff6b6b}
.pause-hint{color:rgba(255,255,255,.15);font-size:11px;margin-top:14px}
.pause-hint kbd{padding:0 5px;border-radius:4px;background:rgba(255,255,255,.05);color:rgba(255,255,255,.25);font-size:10px;border:none;font-family:inherit}
#buffPanel{position:fixed;top:0;left:0;width:100%;height:100%;display:none;z-index:90;align-items:center;justify-content:center}
#buffPanel.open{display:flex}
.buff-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);backdrop-filter:blur(6px)}
.buff-panel{position:relative;z-index:1;background:rgba(20,20,40,.85);border:1px solid rgba(255,255,255,.08);border-radius:24px;padding:28px 28px 20px;max-width:560px;width:92vw;box-shadow:0 24px 80px rgba(0,0,0,.7);text-align:center}
.buff-title{font-size:26px;font-weight:900;color:#ffd700;margin-bottom:2px;text-shadow:0 0 20px rgba(255,215,0,.2)}
.buff-subtitle{color:rgba(255,255,255,.3);font-size:12px;margin-bottom:16px;letter-spacing:2px}
.buff-cards{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.buff-card{pointer-events:auto;flex:1;min-width:140px;max-width:170px;padding:16px 10px;border-radius:16px;border:1.5px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);cursor:pointer;transition:all .3s;text-align:center}
.buff-card:hover{transform:translateY(-8px);border-color:rgba(78,204,163,.4);box-shadow:0 8px 30px rgba(78,204,163,.15),inset 0 0 30px rgba(78,204,163,.03);background:rgba(255,255,255,.06)}
.buff-card.tier2{border-color:rgba(255,215,0,.25)}
.buff-card.tier2:hover{border-color:rgba(255,215,0,.5);box-shadow:0 8px 30px rgba(255,215,0,.15),inset 0 0 30px rgba(255,215,0,.03)}
.buff-card .icon{font-size:32px;display:block;margin-bottom:6px}
.buff-card .name{font-size:14px;font-weight:700;color:#fff;margin-bottom:2px}
.buff-card .desc{font-size:11px;color:rgba(255,255,255,.5);line-height:1.4}
.buff-card .rarity{font-size:9px;margin-top:6px;display:inline-block;padding:1px 8px;border-radius:8px;letter-spacing:1px}
.buff-card .rarity.t1{background:rgba(255,255,255,.05);color:rgba(255,255,255,.3)}
.buff-card .rarity.t2{background:rgba(255,215,0,.1);color:#ffd700}
.buff-card:hover .desc{color:rgba(255,255,255,.7)}
.buff-time{color:rgba(255,255,255,.2);font-size:10px;margin-top:12px;letter-spacing:1px}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui">
    <div id="score">质量: 0</div>
    <div id="buffBar"></div>
  <div id="escHint">ESC 暂停</div>
  <div id="leaderboard"></div>
  <div id="killFeed"></div>
  <div id="levelDisplay"></div>
  <div id="chatPanel">
    <div class="hint" id="chatHint"></div>
  </div>
  <div id="spectateHint"></div>
</div>
<div id="startScreen">
  <div class="floating-ball"></div><div class="floating-ball"></div><div class="floating-ball"></div>
  <div class="floating-ball"></div><div class="floating-ball"></div><div class="floating-ball"></div>
  <div class="panel">
  <h1>球球大作战</h1>
  <div class="subtitle">吃掉所有比你小的球，成为最强者</div>
  <input id="nameInput" type="text" placeholder="输入名字" maxlength="8" value="玩家">
  <canvas id="skinPreview" width="120" height="120"></canvas>
  <div class="skin-picker" id="skinPicker">
    <button class="s sel" data-skin="none">纯色</button>
    <button class="s" data-skin="phoenix">🔥凤凰</button>
    <button class="s" data-skin="thunder">⚡雷电</button>
    <button class="s" data-skin="angel">👼天使</button>
    <button class="s" data-skin="demon">👿恶魔</button>
    <button class="s" data-skin="mech">🤖机甲</button>
    <button class="s" data-skin="aurora">🌀极光</button>
    <button class="s" data-skin="stellar">✨星辰</button>
    <button class="s" data-skin="ghost">👻幽靈</button>
    <div class="skin-level"></div>
  </div>
  <button class="btn-start" id="startBtn">开始游戏</button>
  <div class="rank"></div>
  <div class="controls-hint">
    鼠标移动 · <kbd>空格</kbd> 分裂(长按) · <kbd>W</kbd> 吐球 · <kbd>Shift</kbd> 加速 · <kbd>Enter</kbd> 聊天(<kbd>1</kbd>-<kbd>7</kbd>发送)
  </div>
  <button id="settingsBtn">⚙ 设置</button>
  <div id="settingsPanel">
    <div class="row"><label>音效</label><label class="toggle-switch"><input id="sfxToggle" type="checkbox" checked><span class="toggle-slider"></span></label></div>
    <div class="row"><label>小地图</label><label class="toggle-switch"><input id="mapToggle" type="checkbox" checked><span class="toggle-slider"></span></label></div>
    <div class="row"><label>AI 数量</label><select id="aiCount"><option value="8">少 (8)</option><option value="14" selected>中 (14)</option><option value="22">多 (22)</option></select></div>
    <div class="row"><label>金铲铲模式</label><span style="color:rgba(255,255,255,.3);font-size:11px">每15秒选强化符文</span></div>
  </div>
  </div>
</div>
<div id="deathScreen">
  <h1>你被吃掉了!</h1>
  <div class="sub">💪 再接再厉</div>
  <div class="stats">最终质量: <span id="finalMass">0</span></div>
  <div class="stats">吞噬对手: <span id="finalKills">0</span></div>
  <div class="stats">吃掉食物: <span id="finalFood">0</span></div>
  <div class="stats">分裂次数: <span id="finalSplits">0</span></div>
  <div class="stats">存活时间: <span id="finalTime">0</span>秒</div>
  <div class="exp-gain" id="expGain">经验 +0</div>
  <div id="achievements"></div>
  <div class="btn-group">
    <button id="restartBtn">再来一局</button>
    <button class="btn-sec" id="replayBtn">📺 回放</button>
    <button class="btn-sec" id="spectateBtn">👁 观战</button>
  </div>
</div>
<div id="buffPanel">
  <div class="buff-overlay"></div>
  <div class="buff-panel">
    <div class="buff-title">✨ 选择强化符文</div>
    <div class="buff-subtitle">获得强大的增益效果，可叠加</div>
    <div class="buff-cards" id="buffCards"></div>
    <div class="buff-time" id="buffTime"></div>
  </div>
</div>
<div id="pauseScreen">
  <div class="buff-overlay"></div>
  <div class="pause-panel">
    <div class="pause-title">⏸ 游戏暂停</div>
    <div class="pause-btns">
      <button class="pause-btn primary" id="pauseResumeBtn">▶ 继续游戏</button>
      <button class="pause-btn" id="pauseSfxBtn">🔊 音效</button>
      <button class="pause-btn" id="pauseMapBtn">🗺 小地图</button>
      <button class="pause-btn quit" id="pauseQuitBtn">✕ 退出到菜单</button>
    </div>
    <div class="pause-hint">按 <kbd>ESC</kbd> 继续</div>
  </div>
</div>
<script>
// ============ CONFIG ============
const CFG = {
  MAP: 5000,
  FOOD_COUNT: 700,
  SUPER_FOOD_INTERVAL: 25000,

let previewFrame=0,previewAnimId=null;
function drawSkinPreview(skin){
  if(previewAnimId)cancelAnimationFrame(previewAnimId);
  const pc=PREVIEW_CTX,w=120,h=120;
  function getSkinColor(s){
    const m={'phoenix':'#ff6600','thunder':'#4fc3f7','angel':'#ffe0b2','demon':'#7b1fa2','mech':'#90a4ae','aurora':'#ce93d8','stellar':'#b39ddb','ghost':'#b0c4de'};
    return m[s]||'#44ff88';
  }
  function frame(){
    previewFrame++;const t=previewFrame;
    pc.clearRect(0,0,w,h);
    const cx=60,cy=60,r=28,sc=getSkinColor(skin),slv=getSkinLevel(skin),slf=0.6+slv*0.3;
    // background dots
    for(let i=0;i<10;i++){const a=i*1.3+t*.008;pc.beginPath();pc.arc(cx+Math.cos(a)*38,cy+Math.sin(a)*38,1.2,0,Math.PI*2);pc.fillStyle='rgba(255,255,255,.05)';pc.fill()}
    // trail
    if(skin!=='none'){for(let i=0;i<6;i++){const a=t*.06+i*1.2;pc.beginPath();pc.arc(cx+Math.sin(a)*r*.4,cy+Math.cos(a)*r*.4,r*.3*(1-i/8),0,Math.PI*2);pc.fillStyle=`rgba(255,255,255,${.04*(1-i/8)})`;pc.fill()}}
    // wing/effect shapes
    if(skin==='phoenix'){
      const flp=Math.sin(t*.05)*.3+.7;
      for(let s=-1;s<=1;s+=2){pc.beginPath();pc.moveTo(cx,cy-r*.1);pc.quadraticCurveTo(cx+s*r*slf,cy-r*1.2*flp,cx+s*r*.5,cy-r*.1);pc.quadraticCurveTo(cx+s*r*slf,cy+r*1.2*flp,cx,cy+r*.1);pc.closePath();const g=pc.createLinearGradient(cx,cy-r,cx,cy+r);g.addColorStop(0,'rgba(255,200,50,.5)');g.addColorStop(.5,'rgba(255,80,0,.35)');g.addColorStop(1,'rgba(200,0,0,0)');pc.fillStyle=g;pc.fill()}
    }
    if(skin==='thunder'){for(let i=0;i<4;i++){const a=i*1.57+t*.03;pc.beginPath();let lx=cx+Math.cos(a)*r*.7,ly=cy+Math.sin(a)*r*.7;pc.moveTo(lx,ly);for(let j=0;j<3;j++){lx+=Math.cos(a+j*.5)*6;ly+=Math.sin(a+j*.5)*6;pc.lineTo(lx,ly)}pc.strokeStyle=`rgba(180,230,255,${.4*slf})`;pc.lineWidth=1.5;pc.stroke()}}
    if(skin==='angel'){for(let s=-1;s<=1;s+=2){for(let f=0;f<2;f++){pc.beginPath();pc.ellipse(cx+s*r*(.4+f*.25),cy+(f-.5)*r*.2*slf,r*.15,r*.12*(1.1-f*.2),s*.3,0,Math.PI*2);pc.fillStyle='rgba(255,255,240,.35)';pc.fill()}}}
    if(skin==='demon'){for(let s=-1;s<=1;s+=2){pc.beginPath();pc.moveTo(cx,cy-r*.1);pc.lineTo(cx+s*r*slf,cy-r*.65);pc.lineTo(cx+s*r*.3,cy);pc.lineTo(cx+s*r*slf,cy+r*.65);pc.lineTo(cx,cy+r*.1);pc.closePath();pc.fillStyle='rgba(80,20,120,.4)';pc.fill()}}
    if(skin==='mech'){for(let s=-1;s<=1;s+=2){pc.fillStyle='rgba(120,130,140,.35)';pc.beginPath();pc.moveTo(cx,cy-r*.15);pc.lineTo(cx+s*r*.5*slf,cy-r*.55*slf);pc.lineTo(cx+s*r*.65*slf,cy);pc.lineTo(cx+s*r*.5*slf,cy+r*.55*slf);pc.lineTo(cx,cy+r*.15);pc.closePath();pc.fill()}}
    if(skin==='aurora'){for(let i=0;i<2;i++){const a=i*2+t*.01;pc.beginPath();pc.moveTo(cx-r,cy);for(let x=-r;x<=r;x+=2){pc.lineTo(cx+x,cy+Math.sin(a+x*.02)*r*.3*slf)}pc.strokeStyle=`hsla(${(t*.3+i*60)%360},80%,60%,.2)`;pc.lineWidth=1.5;pc.stroke()}}
    if(skin==='stellar'){for(let i=0;i<5;i++){const a=i*1.256+t*.012,d=r*.6+Math.sin(t*.02+i)*r*.25;pc.beginPath();pc.arc(cx+Math.cos(a)*d,cy+Math.sin(a)*d,2*slf,0,Math.PI*2);pc.fillStyle='rgba(255,255,200,.6)';pc.fill()}}
    if(skin==='ghost'){for(let i=1;i<=2;i++){const off=t*.03+i*1.5;pc.beginPath();pc.arc(cx+Math.sin(off)*r*.1*slf,cy+Math.cos(off)*r*.1*slf,r,0,Math.PI*2);pc.fillStyle=`rgba(180,200,255,${.05-i*.015})`;pc.fill()}}
    // main ball
    const g=pc.createRadialGradient(cx-r*.25,cy-r*.25,0,cx,cy,r);
    g.addColorStop(0,'#fff');g.addColorStop(.4,sc);g.addColorStop(1,darkenColor(sc,40));
    pc.beginPath();pc.arc(cx,cy,r,0,Math.PI*2);pc.fillStyle=g;pc.fill();
    pc.strokeStyle='rgba(255,255,255,.2)';pc.lineWidth=1.5;pc.stroke();
    // level badge
    if(slv>0){pc.fillStyle='rgba(0,0,0,.5)';pc.beginPath();pc.roundRect(85,8,30,16,5);pc.fill();pc.fillStyle='#ffd700';pc.font='bold 9px Arial';pc.textAlign='center';pc.textBaseline='middle';pc.fillText(`Lv${slv}`,100,16)}
    previewAnimId=requestAnimationFrame(frame);
  }
  frame();
}

let audioCtx=null,sfxEnabled=true;

function playTone(freq,dur,type='sine',vol=.15){
  if(!audioCtx||!sfxEnabled)return;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(vol,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+dur);
  o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+dur);
}

// ============ REPLAY ============
let replayData=[],isReplay=false,replayFrame=0,replayId=null;
function recordSnapshot(){
  if(replayData.length>18000)return; // max 5 min at 60fps
  replayData.push({
    t:Date.now(),players:players.filter(p=>p.alive).map(p=>({
      n:p.name,c:p.color,cells:p.cells.filter(c=>c.mass>1).map(c=>({x:c.x,y:c.y,m:c.mass,r:c.radius})),
      tp:p===player
    }))
  });
}

function startReplay(){
  if(!replayData.length)return;
  isReplay=true;replayFrame=0;gameRunning=false;
  deathScreen.style.display='none';spectateHint.textContent='📺 回放中 · 点击退出';
  if(replayId)cancelAnimationFrame(replayId);
  function playReplay(){
    if(replayFrame>=replayData.length-1){spectateHint.textContent='📺 回放结束 · 点击退出';replayFrame=0;return}
    const snap=replayData[replayFrame];
    const rW=W(),rH=H();
    ctx.fillStyle='#0a0a0a';ctx.fillRect(0,0,rW,rH);
    ctx.save();const rcx=camera.x+rW/2,rcy=camera.y+rH/2;ctx.translate(rW/2,rH/2);ctx.scale(zoom,zoom);ctx.translate(-rcx,-rcy);
    drawGrid();drawBackground();
    ctx.strokeStyle='rgba(255,50,50,.3)';ctx.lineWidth=4;ctx.strokeRect(0,0,CFG.MAP,CFG.MAP);
    for(const s of spikes)drawSpike(s);
    for(const f of foods){ctx.beginPath();ctx.arc(f.x,f.y,f.radius,0,Math.PI*2);ctx.fillStyle=f.color;ctx.fill()}
    const allCells=[];
    for(const pd of snap.players){for(const c of pd.cells)allCells.push({cell:c,p:pd})}
    allCells.sort((a,b)=>a.cell.m-b.cell.m);
    for(const {cell:c,p:pd} of allCells){
      const r=c.r;if(r<1)continue;
      const grad=ctx.createRadialGradient(c.x-r*.3,c.y-r*.3,0,c.x,c.y,r);
      grad.addColorStop(0,lightenColor(pd.c,40));grad.addColorStop(.7,pd.c);grad.addColorStop(1,darkenColor(pd.c,40));
      ctx.beginPath();ctx.arc(c.x,c.y,r,0,Math.PI*2);ctx.fillStyle=grad;ctx.fill();
      ctx.strokeStyle=pd.tp?'rgba(255,255,255,.8)':'rgba(255,255,255,.2)';ctx.lineWidth=pd.tp?3:1.5;ctx.stroke();
      ctx.fillStyle='#fff';ctx.font=`bold ${Math.max(11,Math.min(r*.7,28))}px "Microsoft YaHei",Arial,sans-serif`;
      ctx.textAlign='center';ctx.textBaseline='middle';ctx.shadowColor='rgba(0,0,0,.85)';ctx.shadowBlur=5;
      ctx.fillText(pd.n,c.x,c.y-4);ctx.shadowBlur=0;
    }
    ctx.restore();
    // follow player in replay
    const me=snap.players.find(p=>p.tp);
    if(me&&me.cells.length){
      const cx=me.cells.reduce((s,c)=>s+c.x,0)/me.cells.length;
      const cy=me.cells.reduce((s,c)=>s+c.y,0)/me.cells.length;
      camera.x=lerp(camera.x,cx-W()/2,.15);camera.y=lerp(camera.y,cy-H()/2,.15);
    }
    const tm=Math.round(((snap.t-replayData[0].t)/1000));
    ctx.fillStyle='rgba(255,255,255,.3)';ctx.font='12px Arial';
    ctx.textAlign='left';ctx.fillText(`回放 ${replayFrame}/${replayData.length-1}  ${tm}s`,15,25);
    replayFrame++;
    replayId=requestAnimationFrame(playReplay);
  }
  playReplay();
}

function totalMass(p){return p.cells.reduce((s,c)=>s+c.mass,0)}
function getMaxCell(p){return p.cells.reduce((a,b)=>a.mass>b.mass?a:b)}
function updateRadius(c){c.radius=massToR(c.mass)}

// ============ FOOD & SPIKES ============
function createFood(){return{x:rand(30,CFG.MAP-30),y:rand(30,CFG.MAP-30),radius:rand(4,7),color:randomColor(),mass:rand(2,5)}}
function createSpike(){return{x:rand(100,CFG.MAP-100),y:rand(100,CFG.MAP-100),radius:18,mass:30,color:'#2ecc71',spikes:6}}
function createSuperFood(){return{x:rand(100,CFG.MAP-100),y:rand(100,CFG.MAP-100),radius:14,color:'#ffd700',mass:20,pulse:0}}
function spawnFoods(){while(foods.length<CFG.FOOD_COUNT)foods.push(createFood())}

// ============ MOVEMENT ============
function movePlayer(p){
  if(!p.alive)return;
  if(!p.isBot&&chatOpen)return; // freeze when chatting
  const cs=p.cells.filter(c=>c.mass>0);if(!cs.length)return;
  let tx,ty;
  if(p.isBot){tx=p.targetX;ty=p.targetY}else{tx=camera.x+mouse.x;ty=camera.y+mouse.y}
  const totalM=cs.reduce((s,c)=>s+c.mass,0);
  let sp=speedFactor(totalM)*(p.buffData.speedMult||1);if(p.sprintTimer>0)sp*=CFG.SPRINT_MULTIPLIER;sp=Math.max(.5,sp);
  for(const c of cs){
    const dx=tx-c.x,dy=ty-c.y,d=Math.hypot(dx,dy);
    if(d>c.radius*.6){const moveSp=Math.max(.3,Math.min(CFG.BASE_SPEED,sp*(1-c.radius/800)));const a=Math.atan2(dy,dx);c.vx+=Math.cos(a)*moveSp*.25;c.vy+=Math.sin(a)*moveSp*.25}
    c.vx*=.88;c.vy*=.88;c.x+=c.vx;c.y+=c.vy;
    if(c.x<c.radius){c.x=c.radius;c.vx*=-.5}if(c.x>CFG.MAP-c.radius){c.x=CFG.MAP-c.radius;c.vx*=-.5}
    if(c.y<c.radius){c.y=c.radius;c.vy*=-.5}if(c.y>CFG.MAP-c.radius){c.y=CFG.MAP-c.radius;c.vy*=-.5}
  }
}
function speedFactor(mass){if(mass<20)return 1;return Math.max(.4,1.2-Math.sqrt(mass)*.025)}

// ============ SPRINT ============
function doSprint(p){
  if(p.sprintCooldown>0||p.sprintTimer>0)return;const tm=totalMass(p);if(tm<15)return;const cost=tm*CFG.SPRINT_COST*(p.buffData.sprintCostMult||1);
  for(const c of p.cells){const r=c.mass/tm;c.mass-=cost*r;if(c.mass<2)c.mass=2;updateRadius(c)}
  p.sprintTimer=CFG.SPRINT_DURATION*(p.buffData.sprintDurMult||1);p.sprintCooldown=CFG.SPRINT_COOLDOWN*(p.buffData.sprintCdMult||1);sfxSprint();
}

// ============ SPLIT ============
function doSplit(p){
  if(!p.alive)return;
  const cs=p.cells.filter(c=>c.mass>=CFG.MIN_SPLIT_MASS);const maxCells=CFG.MAX_CELLS+(p.buffData.maxCellBonus||0);if(!cs.length||p.cells.length>=maxCells)return;
  const c=getMaxCell(p);if(c.mass<CFG.MIN_SPLIT_MASS)return;
  const half=c.mass/2;c.mass=half;updateRadius(c);
  let tx,ty;if(p.isBot){tx=p.targetX;ty=p.targetY}else{tx=camera.x+mouse.x;ty=camera.y+mouse.y}
  const a=Math.atan2(ty-c.y,tx-c.x);
  const nc=createCell(c.x+Math.cos(a)*c.radius*1.5,c.y+Math.sin(a)*c.radius*1.5,half);
  nc.vx=Math.cos(a)*12;nc.vy=Math.sin(a)*12;nc.lastSplit=Date.now();
  p.cells.push(nc);p.splitCount++;sfxSplit();spawnParticles(c.x,c.y,p.color,8,5,3);
  p.cells=p.cells.filter(cell=>cell.mass>1);
}

// ============ EJECT ============
function doEject(p){
  if(!p.alive)return;const c=getMaxCell(p);const ejectCost=Math.max(1,CFG.EJECT_COST-(p.buffData.ejectCostReduction||0));if(!c||c.mass<ejectCost+2)return;
  c.mass-=ejectCost;updateRadius(c);
  let tx,ty;if(p.isBot){tx=p.targetX;ty=p.targetY}else{tx=camera.x+mouse.x;ty=camera.y+mouse.y}
  const a=Math.atan2(ty-c.y,tx-c.x);
  const ex=c.x+Math.cos(a)*c.radius,ey=c.y+Math.sin(a)*c.radius;
  ejected.push({x:ex,y:ey,vx:Math.cos(a)*6,vy:Math.sin(a)*6,mass:CFG.EJECT_COST,radius:6,color:p.color,alive:true,owner:p.id,life:300,skin:p.skin});
  // skin-specific eject particles
  if(p.skin!=='none'&&c.radius>20){const ps=Math.min(3,c.radius/30);
    for(let i=0;i<4;i++){const ang=a+rand(-.5,.5),spd=rand(2,4);particles.push({x:ex+rand(-4,4),y:ey+rand(-4,4),vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,life:1,decay:.02,radius:rand(2,4)*ps,color:p.skin==='aurora'?`hsl(${randI(0,360)},80%,60%)`:skinForeColor(p.skin)})}
  }
  sfxEject();p.cells=p.cells.filter(cell=>cell.mass>1);
}

// ============ MERGE ============
function processMerge(p){
  if(p.cells.length<2)return;const now=Date.now();
  const mergeTime=CFG.MERGE_TIME*(p.buffData.mergeTimeMult||1);
  for(let i=0;i<p.cells.length;i++)for(let j=i+1;j<p.cells.length;j++){
    const a=p.cells[i],b=p.cells[j];if(a.mass<1||b.mass<1)continue;
    if(now-a.lastSplit<mergeTime||now-b.lastSplit<mergeTime)continue;
    if(dist(a,b)<(a.radius+b.radius)*.5){const tm=a.mass+b.mass;a.x=(a.x*a.mass+b.x*b.mass)/tm;a.y=(a.y*a.mass+b.y*b.mass)/tm;a.mass=tm;updateRadius(a);b.mass=0;p.cells=p.cells.filter(c=>c.mass>1);return}
  }
}

// ============ AI ============
const personalities=[{name:'莽夫',chaseRange:900,fleeRange:200,aggro:1.8},{name:'憨憨',chaseRange:700,fleeRange:250,aggro:1.5},{name:'愣头',chaseRange:800,fleeRange:150,aggro:1.6}];
function updateBot(p){
  if(!p.alive||!p.cells.length)return;const cs=p.cells.filter(c=>c.mass>0);if(!cs.length)return;
  const totalM=cs.reduce((s,c)=>s+c.mass,0);
  const cx=cs.reduce((s,c)=>s+c.x,0)/cs.length,cy=cs.reduce((s,c)=>s+c.y,0)/cs.length;
  const per=personalities[p.personality]||personalities[2];
  let nTh=null,ntD=Infinity,nPr=null,npD=Infinity,nFd=null,nfD=Infinity,nSk=null,nsD=Infinity;
  for(const op of players){if(op===p||!op.alive||!op.cells.length)continue;
    const om=op.cells.reduce((s,c)=>s+c.mass,0);const ocx=op.cells.reduce((s,c)=>s+c.x,0)/op.cells.length,ocy=op.cells.reduce((s,c)=>s+c.y,0)/op.cells.length;const d=Math.hypot(cx-ocx,cy-ocy);
    if(om>totalM*per.aggro&&d<ntD){nTh=op;ntD=d}if(totalM>om*per.aggro&&d<npD){nPr=op;npD=d}
  }
  for(const f of foods){const d=Math.hypot(cx-f.x,cy-f.y);if(d<nfD){nFd=f;nfD=d}}
  for(const s of spikes){const d=Math.hypot(cx-s.x,cy-s.y);if(d<nsD){nSk=s;nsD=d}}
  let tx=cx,ty=cy;
  if(nTh&&ntD<per.fleeRange){const a=Math.atan2(cy-nTh.cells[0].y,cx-nTh.cells[0].x);tx=cx+Math.cos(a)*300;ty=cy+Math.sin(a)*300}
  else if(nPr&&npD<per.chaseRange){const pcy=nPr.cells.reduce((s,c)=>s+c.y,0)/nPr.cells.length,pcx=nPr.cells.reduce((s,c)=>s+c.x,0)/nPr.cells.length;const a=Math.atan2(pcy-cy,pcx-cx);tx=pcx+Math.cos(a)*40;ty=pcy+Math.sin(a)*40}
  else if(nFd&&nfD<900){tx=nFd.x;ty=nFd.y}else{if(!p.targetX||Math.hypot(cx-p.targetX,cy-p.targetY)<100){p.targetX=rand(100,CFG.MAP-100);p.targetY=rand(100,CFG.MAP-100)}tx=p.targetX;ty=p.targetY}
  p.targetX=clamp(tx,50,CFG.MAP-50);p.targetY=clamp(ty,50,CFG.MAP-50);
  // dumb split: split only when very confident and aim poorly
  if(nPr&&npD<100&&totalM>nPr.cells.reduce((s,c)=>s+c.mass,0)*1.8&&Math.random()<.3)doSplit(p);
  // occasionally eject randomly
  if(Math.random()<.005)doEject(p);
}

// ============ COLLISION ============
function processEating(){
  const gameTimeMult=Math.pow(2,Math.floor((Date.now()-gameStartTime)/60000));
  const newLevel=Math.floor((Date.now()-gameStartTime)/60000);
  if(newLevel>foodMultLevel){foodMultLevel=newLevel;announce(`🔥 食物增益 x${gameTimeMult}！`,'#ffd700')}
  for(let fi=foods.length-1;fi>=0;fi--){const f=foods[fi];let e=false;
    for(const p of players){if(!p.alive)continue;for(const c of p.cells){if(c.mass<1)continue;updateRadius(c);const eatRange=c.radius*(p.buffData.eatRangeMult||1);if(dist(c,f)<eatRange){c.mass+=f.mass*.6*(p.buffData.foodGainMult||1)*gameTimeMult;p.foodEaten++;spawnParticles(f.x,f.y,f.color,4,3,3);if(p===player)sfxEat();foods.splice(fi,1);e=true;break}}if(e)break}
  }
  for(let si=superFoods.length-1;si>=0;si--){const sf=superFoods[si];let e=false;
    for(const p of players){if(!p.alive)continue;for(const c of p.cells){if(c.mass<1)continue;if(dist(c,sf)<c.radius){c.mass+=sf.mass*.8*(p.buffData.superFoodGainMult||1)*gameTimeMult;spawnParticles(sf.x,sf.y,'#ffd700',30,8,6);if(p===player)shakeIntensity=4;sfxEat();superFoods.splice(si,1);e=true;break}}if(e)break}
  }
  for(let ei=ejected.length-1;ei>=0;ei--){const e=ejected[ei];if(!e.alive)continue;e.x+=e.vx;e.y+=e.vy;e.vx*=.95;e.vy*=.95;e.life-=.016;if(e.life<=0){e.alive=false;ejected.splice(ei,1);continue}let eaten=false;
    for(const p of players){if(!p.alive)continue;for(const c of p.cells){if(c.mass<1)continue;if(dist(c,e)<c.radius){c.mass+=e.mass*.4;ejected.splice(ei,1);eaten=true;break}}if(eaten)break}
  }
  for(let i=0;i<players.length;i++){const a=players[i];if(!a.alive||!a.cells.length)continue;
    for(let j=i+1;j<players.length;j++){const b=players[j];if(!b.alive||!b.cells.length)continue;let brk=false;
      for(let ai=0;ai<a.cells.length&&!brk;ai++){for(let bi=0;bi<b.cells.length&&!brk;bi++){const ca=a.cells[ai],cb=b.cells[bi];if(ca.mass<1||cb.mass<1)continue;const d=dist(ca,cb);
        const bg=ca.mass>cb.mass?ca:cb,sm=ca.mass>cb.mass?cb:ca,ob=ca.mass>cb.mass?a:b,os=ca.mass>cb.mass?b:a;
        if(d<bg.radius-sm.radius*.3&&bg.mass>sm.mass*1.12){bg.mass+=sm.mass*.5;updateRadius(bg);sm.mass=0;ob.kills++;
          if(ob===player){
            shakeIntensity=12;killStreak=Date.now()-lastKillTime<5000?killStreak+1:1;lastKillTime=Date.now();
            const sn=['','','双杀！','三杀！','四杀！','五杀！','超神！'];const si=Math.min(killStreak,6);
            if(killStreak>=2)announce(`🔥 ${sn[si]}`,'#ff4500');
          }
          if(!os.isBot){gameOver(os);return}
          spawnParticles(sm.x,sm.y,os.color,40,10,8);spawnParticles(sm.x,sm.y,'#ffd700',15,7,5);announce(`${ob.name} 吞噬了 ${os.name}`,'#ff6b6b');sfxEatPlayer();
          a.cells=a.cells.filter(c=>c.mass>1);b.cells=b.cells.filter(c=>c.mass>1);
          if(!b.cells.length&&b.isBot){b.cells=[createCell(rand(200,CFG.MAP-200),rand(200,CFG.MAP-200),rand(15,30))];b.kills=0}
          if(!a.cells.length&&a.isBot){a.cells=[createCell(rand(200,CFG.MAP-200),rand(200,CFG.MAP-200),rand(15,30))];a.kills=0}
          brk=true}
      }}
    }
  }
  for(let si=spikes.length-1;si>=0;si--){const sp=spikes[si];for(const p of players){if(!p.alive)continue;for(let ci=0;ci<p.cells.length;ci++){const c=p.cells[ci];if(c.mass<1)continue;if(dist(c,sp)<(c.radius+sp.radius)*.7){
    c.mass+=sp.mass;updateRadius(c);spawnParticles(sp.x,sp.y,'#2ecc71',20,8,5);sfxSplit();
    const maxCells=CFG.MAX_CELLS+(p.buffData.maxCellBonus||0);
    while(p.cells.length<maxCells){const big=getMaxCell(p);if(!big||big.mass<CFG.MIN_SPLIT_MASS*2)break;const half=big.mass/2;big.mass=half;updateRadius(big);const a=rand(0,Math.PI*2);const nc=createCell(big.x+Math.cos(a)*big.radius*1.5,big.y+Math.sin(a)*big.radius*1.5,half);nc.vx=Math.cos(a)*12;nc.vy=Math.sin(a)*12;nc.lastSplit=0;p.cells.push(nc)}
    spikes.splice(si,1);spikes.push(createSpike());break
  }}}}
}

// ============ DECAY ============
function processDecay(){for(const p of players){if(!p.alive)continue;for(const c of p.cells){if(c.mass>CFG.MIN_MASS){c.mass-=Math.max(c.mass*CFG.DECAY_RATE*(p.buffData.decayMult||1),.3);if(c.mass<CFG.MIN_MASS)c.mass=CFG.MIN_MASS;updateRadius(c)}}}}

// ============ SPECTATE ============
let isSpectating=false,spectateId=null;
function startSpectate(){
  isSpectating=true;gameRunning=false;deathScreen.style.display='none';
  spectateHint.textContent='👁 观战模式 · 按 Esc 退出';
  if(spectateId)cancelAnimationFrame(spectateId);
  function doSpectate(){
    const sorted=players.filter(p=>p.alive&&p.cells.length).sort((a,b)=>totalMass(b)-totalMass(a));
    const top=sorted[0];if(!top){spectateId=requestAnimationFrame(doSpectate);return}
    const cx=top.cells.reduce((s,c)=>s+c.x,0)/top.cells.length;
    const cy=top.cells.reduce((s,c)=>s+c.y,0)/top.cells.length;
    camera.x=lerp(camera.x,cx-W()/2,.08);camera.y=lerp(camera.y,cy-H()/2,.08);
    draw();
    spectateId=requestAnimationFrame(doSpectate);
  }
  doSpectate();
}
function stopSpectate(){isSpectating=false;if(spectateId)cancelAnimationFrame(spectateId);spectateHint.textContent='';deathScreen.style.display='flex'}

function quitGame(){
  gameRunning=false;if(animId)cancelAnimationFrame(animId);
  isReplay=false;isSpectating=false;chatOpen=false;
  if(replayId)cancelAnimationFrame(replayId);if(spectateId)cancelAnimationFrame(spectateId);
  escHint.style.display='none';spectateHint.textContent='';
  deathScreen.style.display='none';startScreen.style.display='flex';
  document.getElementById('buffPanel').classList.remove('open');
  startDemo();startBGM();
}

// ============ UPDATE ============
function update(){
  if(!gameRunning||!player||!player.alive)return;
  frameCount++;gameRunning&&frameCount%CFG.REPLAY_INTERVAL===0&&recordSnapshot();

  movePlayer(player);
  if(player.sprintTimer>0)player.sprintTimer-=16;if(player.sprintCooldown>0)player.sprintCooldown-=16;
  processMerge(player);

  // space hold for continuous split
  const splitInterval=CFG.SPLIT_INTERVAL*(player.buffData.splitCdMult||1);
  if(keys[' ']&&Date.now()-lastSplitTime>splitInterval){doSplit(player);lastSplitTime=Date.now()}

  // buff timer (金铲铲模式)
  if(player.alive&&Date.now()-buffTimer>buffInterval){
    buffTimer=Date.now();showBuffSelection();
  }

  // regeneration buff
  if(player.alive&&player.buffData.regenRate>0){
    const regenMass=player.buffData.regenRate/60;
    for(const c of player.cells){c.mass+=regenMass;updateRadius(c)}
  }

  // ============ MAP FEATURES ============
  // spawn 秘境 portals (max 2, every 25s)
  if(secretRealms.length<2&&Date.now()-srTimer>25000){
    srTimer=Date.now();
    secretRealms.push({x:rand(200,CFG.MAP-200),y:rand(200,CFG.MAP-200),radius:60,pulse:0,used:false});
  }
  for(let i=secretRealms.length-1;i>=0;i--){const sr=secretRealms[i];sr.pulse+=.04;if(sr.used)secretRealms.splice(i,1)}
  // spawn wormhole pairs (max 2 pairs, every 22s)
  if(wormholes.length<4&&Date.now()-whTimer>22000){
    whTimer=Date.now();
    const w1={x:rand(150,CFG.MAP-150),y:rand(150,CFG.MAP-150),radius:28,pulse:0};
    const w2={x:rand(150,CFG.MAP-150),y:rand(150,CFG.MAP-150),radius:28,pulse:0};
    w1.pair=w2;w2.pair=w1;wormholes.push(w1,w2);
    // despawn oldest pair if too many
    if(wormholes.length>4){wormholes.splice(0,2)}
  }
  // 秘境: player entry
  if(!inRealm&&player&&player.alive){for(const sr of secretRealms){if(sr.used)continue;
    for(const c of player.cells){if(c.mass<1)continue;if(dist(c,sr)<sr.radius){sr.used=true;
      const cx=player.cells.reduce((s,cl)=>s+cl.x,0)/player.cells.length,cy=player.cells.reduce((s,cl)=>s+cl.y,0)/player.cells.length;
      realmReturn={x:cx,y:cy};realmTreasures=[];const rcx=CFG.MAP*2,rcy=CFG.MAP/2;
      for(let i=0;i<5;i++){const ang=rand(0,Math.PI*2),d=rand(40,160);realmTreasures.push({x:rcx+Math.cos(ang)*d,y:rcy+Math.sin(ang)*d,radius:14,type:['mass','speed','range'][randI(0,2)],taken:false})}
      spawnParticles(sr.x,sr.y,'#ffd700',40,12,8);sfxEat();announce('✨ 进入秘境！收集宝藏获取加成！','#ffd700');
      inRealm=true;realmTimer=Date.now();break
    }}
  }}
  // realm logic: collect treasures
  if(inRealm&&player&&player.alive){
    const rcx=CFG.MAP*2, rcy=CFG.MAP/2;
    // teleport cells to realm on first frame
    for(const c of player.cells){if(Math.abs(c.x-rcx)>500){c.x=rcx+rand(-50,50);c.y=rcy+rand(-50,50)}}
    for(const tr of realmTreasures){if(tr.taken)continue;
      for(const c of player.cells){if(c.mass<1)continue;if(dist(c,tr)<c.radius+tr.radius){tr.taken=true;spawnParticles(tr.x,tr.y,'#ffd700',15,6,4);
        if(tr.type==='mass'){const add=rand(20,50);for(const cl of player.cells){cl.mass+=add/player.cells.length;updateRadius(cl)};announce(`💪 力量宝藏 +${add} 质量！`,'#ffd700')}
        else if(tr.type==='speed'){player.buffData.speedMult*=1.15;announce('💨 疾风宝藏 +15% 移速！','#4fc3f7')}
        else if(tr.type==='range'){player.buffData.eatRangeMult*=1.2;announce('👁️ 视野宝藏 +20% 吞噬范围！','#a29bfe')}
        break;
      }}
    }
    // auto return when all taken or 12s timeout
    if(Date.now()-realmTimer>12000||realmTreasures.every(t=>t.taken)){
      for(const c of player.cells){c.x=realmReturn.x+rand(-30,30);c.y=realmReturn.y+rand(-30,30)}
      inRealm=false;announce('🚀 秘境探险结束，已传送回原地图！','#ffd700');spawnParticles(realmReturn.x,realmReturn.y,'#ffd700',30,8,6)
    }
  }
  // wormhole teleport (with 1s cooldown per cell)
  for(let i=0;i<wormholes.length;i+=2){const w1=wormholes[i],w2=wormholes[i+1];if(!w1||!w2)continue;w1.pulse+=.05;w2.pulse+=.05;
    for(const p of players){if(!p.alive)continue;
      for(const c of p.cells){if(c.mass<1||(c._lastWarp&&Date.now()-c._lastWarp<1000))continue;const now=Date.now();
        if(dist(c,w1)<w1.radius+c.radius){c.x=w2.x+rand(80,130)*(Math.random()<.5?1:-1);c.y=w2.y+rand(80,130)*(Math.random()<.5?1:-1);c._lastWarp=now;spawnParticles(w1.x,w1.y,'#7c3aed',12,4,3);spawnParticles(w2.x,w2.y,'#7c3aed',12,4,3);if(p===player)playTone(500,.12,'sine',.08)}
        else if(dist(c,w2)<w2.radius+c.radius){c.x=w1.x+rand(80,130)*(Math.random()<.5?1:-1);c.y=w1.y+rand(80,130)*(Math.random()<.5?1:-1);c._lastWarp=now;spawnParticles(w2.x,w2.y,'#7c3aed',12,4,3);spawnParticles(w1.x,w1.y,'#7c3aed',12,4,3);if(p===player)playTone(500,.12,'sine',.08)}
      }
    }
  }

  for(const p of players){if(p.isBot&&p.alive){updateBot(p);movePlayer(p);processMerge(p)}}
  // record trails for skin effects
  for(const p of players){if(p.alive&&p.skin!=='none'&&p.cells.length){const mc=getMaxCell(p);
    if(frameCount%2===0){p.trail.push({x:mc.x,y:mc.y,life:1,r:mc.radius});if(p.trail.length>18)p.trail.shift()}
    for(let i=p.trail.length-1;i>=0;i--){p.trail[i].life*=.93;if(p.trail[i].life<.01)p.trail.splice(i,1)}
  }}

  decayTimer+=16;if(decayTimer>=CFG.DECAY_INTERVAL){processDecay();decayTimer=0}
  superFoodTimer+=16;if(superFoodTimer>=CFG.SUPER_FOOD_INTERVAL&&superFoods.length<3){superFoods.push(createSuperFood());superFoodTimer=0}

  processEating();spawnFoods();

  if(player.alive&&player.cells.length){
    const cx=player.cells.reduce((s,c)=>s+c.x,0)/player.cells.length;
    const cy=player.cells.reduce((s,c)=>s+c.y,0)/player.cells.length;
    camera.x=lerp(camera.x,cx-W()/2,.1);camera.y=lerp(camera.y,cy-H()/2,.1);
    // dynamic zoom: zoom out as player grows
    const playerMass=totalMass(player);
    zoom=lerp(zoom,Math.max(.35,1-(playerMass-10)*.0006),.05);
  }

  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vx*=.96;p.vy*=.96;p.life-=p.decay;if(p.life<=0)particles.splice(i,1)}
  if(particles.length>300)particles.splice(0,particles.length-300);
  // skin particles
  for(const sp of players){if(!sp.alive||sp.skin==='none')continue;const sc=getMaxCell(sp);if(!sc||sc.radius<15)continue;const sr=sc.radius,scl=Math.min(3,sr/25)*(0.5+(sp.skinLevel||1)*0.3),ps=Math.min(2,sr/30),vs=Math.min(1.5,sr/30);
    if(sp.skin==='phoenix'&&Math.random()<.12*scl){
      const a=Math.random()*Math.PI*2;particles.push({x:sc.x+Math.cos(a)*sr*.6,y:sc.y+Math.sin(a)*sr*.6,
