        radius:rand(1,3)*ps,color:`hsl(${randI(20,40)},100%,${randI(50,80)}%)`,life:rand(.6,1),decay:.012})
    }
    if(sp.skin==='thunder'&&Math.random()<.08*scl){
      const a=Math.random()*Math.PI*2;particles.push({x:sc.x+Math.cos(a)*sr*.7,y:sc.y+Math.sin(a)*sr*.7,
        vx:Math.cos(a)*rand(1,3)*vs,vy:Math.sin(a)*rand(1,3)*vs,
        radius:rand(1,2.5)*ps,color:`hsl(${randI(180,220)},100%,${randI(60,90)}%)`,life:rand(.3,.6),decay:.03})
    }
    if(sp.skin==='angel'&&Math.random()<.06*scl){
      const a=Math.random()*Math.PI*2;particles.push({x:sc.x+Math.cos(a)*sr*.8,y:sc.y+Math.sin(a)*sr*.8,
        vx:Math.cos(a)*rand(.2,.6)*vs,vy:Math.sin(a)*rand(.2,.6)*vs-rand(.3,.8),
        radius:rand(1,2)*ps,color:`hsla(${randI(40,50)},80%,${randI(70,95)}%,.6)`,life:rand(.4,.7),decay:.025})
    }
    if(sp.skin==='demon'&&Math.random()<.1*scl){
      const a=Math.random()*Math.PI*2;particles.push({x:sc.x+Math.cos(a)*sr*.5,y:sc.y+Math.sin(a)*sr*.5,
        vx:Math.cos(a)*rand(-.5,.5)*vs,vy:Math.sin(a)*rand(-.5,.5)*vs,
        radius:rand(2,5)*ps,color:'rgba(120,20,180,.5)',life:rand(.5,.8),decay:.018})
    }
    if(sp.skin==='mech'&&Math.random()<.1*scl){
      const a=Math.random()*Math.PI*2;particles.push({x:sc.x+Math.cos(a)*sr*.6,y:sc.y+Math.sin(a)*sr*.6,
        vx:Math.cos(a)*rand(-1,1)*vs,vy:Math.sin(a)*rand(-1,1)*vs-rand(.5,1.5),
        radius:rand(1,2)*ps,color:`hsl(${randI(20,40)},100%,${randI(50,70)}%)`,life:rand(.3,.5),decay:.04})
    }
    if(sp.skin==='aurora'&&Math.random()<.12*scl){
      const a=Math.random()*Math.PI*2,hue=(frameCount*2+randI(0,60))%360;particles.push({x:sc.x+Math.cos(a)*(sr*.3+rand(0,sr*.5)),y:sc.y+Math.sin(a)*(sr*.3+rand(0,sr*.5)),
        vx:Math.cos(a)*rand(.1,.4)*vs+rand(-.2,.2),vy:Math.sin(a)*rand(.1,.4)*vs+rand(-.2,.2),
        radius:rand(2,5)*ps,color:`hsla(${hue},80%,60%,.3)`,life:rand(.5,1),decay:.015})
    }
    if(sp.skin==='stellar'&&Math.random()<.07*scl){
      const a=Math.random()*Math.PI*2;particles.push({x:sc.x+Math.cos(a)*sr*.6,y:sc.y+Math.sin(a)*sr*.6,
        vx:Math.cos(a)*rand(-.8,.8)*vs,vy:Math.sin(a)*rand(-.8,.8)*vs,
        radius:rand(.5,1.5)*ps,color:`rgba(255,255,200,${rand(.5,.8)})`,life:rand(.5,.8),decay:.025})
    }
    if(sp.skin==='ghost'&&Math.random()<.08*scl){
      const a=Math.random()*Math.PI*2;particles.push({x:sc.x+Math.cos(a)*sr*.7,y:sc.y+Math.sin(a)*sr*.7,
        vx:Math.cos(a)*rand(-.3,.3)*vs,vy:Math.sin(a)*rand(-.3,.3)*vs-rand(.1,.3),
        radius:rand(3,6)*ps,color:'rgba(180,210,255,.15)',life:rand(.6,1),decay:.01})
    }
  }
  for(const sf of superFoods)sf.pulse+=.03;

  if(player.alive){
    scoreEl.textContent=`质量: ${Math.floor(totalMass(player))}  |  得分: ${Math.floor(totalMass(player)*10)}`;
    if(buffBar){
      const remain=Math.max(0,Math.ceil((buffInterval-(Date.now()-buffTimer))/1000));
      if(player.ownedBuffs.length){
        const MAX_VIS=5;const show=player.ownedBuffs.slice(0,MAX_VIS);
        let html='<span class="tag">✨</span>';
        show.forEach(id=>{const b=BUFF_POOL.find(x=>x.id===id);if(b)html+=`<span class="b${b.tier===2?' t2':''}"><span class="ic">${b.icon}</span>${b.name}</span>`});
        if(player.ownedBuffs.length>MAX_VIS)html+=`<span class="more">+${player.ownedBuffs.length-MAX_VIS}</span>`;
        html+=`<span class="cd">⏳${remain}s</span>`;
        buffBar.innerHTML=html;buffBar.style.display='flex';
      }else{buffBar.innerHTML=`<span class="cd">⏳${remain}s</span>`;buffBar.style.display='flex'}
    }else if(buffBar){buffBar.style.display='none'}
  }
  const tm=totalMass(player);if(tm>player.maxMass)player.maxMass=tm;
  updateLeaderboard();updateLevelDisplay();

  if(tm>=100&&checkAchievement('mass_100',true))announce('🏆 解锁成就: 小有成就','#ffd700');
  if(tm>=500&&checkAchievement('mass_500',true))announce('🏆 解锁成就: 庞然大物','#ffd700');
  if(tm>=1000&&checkAchievement('mass_1000',true))announce('🏆 解锁成就: 巨无霸','#ffd700');
  if(player.kills>=1&&checkAchievement('kill_1',true))announce('🏆 解锁成就: 首次猎杀','#ffd700');
  if(player.kills>=10&&checkAchievement('kill_10',true))announce('🏆 解锁成就: 十连斩','#ffd700');
  if(player.foodEaten>=100&&checkAchievement('eat_100',true))announce('🏆 解锁成就: 大胃王','#ffd700');
  if(player.splitCount>=5&&checkAchievement('split_5',true))announce('🏆 解锁成就: 分裂达人','#ffd700');
}

// ============ DRAW ============
function draw(){
  const W2=W(),H2=H();
  ctx.setTransform(1,0,0,1,0,0);
  ctx.fillStyle='#0a0a0a';ctx.fillRect(0,0,W2,H2);
  ctx.save();
  if(shakeIntensity>0){
    const sx=(Math.random()-.5)*shakeIntensity,sy=(Math.random()-.5)*shakeIntensity;
    ctx.translate(sx,sy);shakeIntensity*=.85;if(shakeIntensity<.8)shakeIntensity=0;
  }
  try{
  const cx=camera.x+W2/2,cy=camera.y+H2/2;ctx.translate(W2/2,H2/2);ctx.scale(zoom,zoom);ctx.translate(-cx,-cy);
  drawBackground();drawGrid();
  ctx.strokeStyle='rgba(255,50,50,.3)';ctx.lineWidth=4;ctx.strokeRect(0,0,CFG.MAP,CFG.MAP);
  // 秘境 portals
  if(!inRealm){for(const sr of secretRealms){if(sr.used)continue;
    const r=sr.radius+Math.sin(sr.pulse)*5;
    for(let i=0;i<12;i++){const a=i*Math.PI/6+sr.pulse,d=r*1.2+Math.sin(sr.pulse*2+i)*15;
      ctx.beginPath();ctx.arc(sr.x+Math.cos(a)*d,sr.y+Math.sin(a)*d,3+Math.sin(sr.pulse*3+i)*2,0,Math.PI*2);
      ctx.fillStyle=`hsla(${45+i*15},90%,${60+Math.sin(sr.pulse+i)*20}%,.5)`;ctx.fill()}
    const gr=ctx.createRadialGradient(sr.x,sr.y,0,sr.x,sr.y,r);
    gr.addColorStop(0,'rgba(255,215,0,.15)');gr.addColorStop(.5,'rgba(200,150,50,.08)');gr.addColorStop(1,'rgba(100,50,0,0)');
    ctx.beginPath();ctx.arc(sr.x,sr.y,r,0,Math.PI*2);ctx.fillStyle=gr;ctx.fill();
    ctx.strokeStyle=`rgba(255,215,0,${.15+Math.sin(sr.pulse)*.1})`;ctx.lineWidth=2;ctx.setLineDash([4,6]);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle='rgba(255,215,0,.3)';ctx.font='10px Arial';ctx.textAlign='center';ctx.fillText('秘境',sr.x,sr.y-5)
  }}
  // realm area (separate mini-map)
  if(inRealm){const rcx=CFG.MAP*2,rcy=CFG.MAP/2;
    ctx.fillStyle='rgba(20,10,40,.85)';ctx.fillRect(rcx-300,rcy-300,600,600);
    ctx.strokeStyle='rgba(255,215,0,.2)';ctx.lineWidth=2;ctx.strokeRect(rcx-300,rcy-300,600,600);
    for(const tr of realmTreasures){if(tr.taken)continue;
      const pr=tr.radius+Math.sin(frameCount*.05)*3;
      const tg=ctx.createRadialGradient(tr.x-3,tr.y-3,0,tr.x,tr.y,pr);
      tg.addColorStop(0,'#fffbe6');tg.addColorStop(.3,'#ffd700');tg.addColorStop(1,'#b8860b');
      ctx.beginPath();ctx.arc(tr.x,tr.y,pr,0,Math.PI*2);ctx.fillStyle=tg;ctx.fill();
      ctx.shadowColor='#ffd700';ctx.shadowBlur=15;ctx.strokeStyle='rgba(255,215,0,.5)';ctx.lineWidth=2;ctx.stroke();ctx.shadowBlur=0;
      ctx.fillStyle='#fff';ctx.font='8px Arial';ctx.textAlign='center';ctx.fillText(tr.type==='mass'?'💪':tr.type==='speed'?'💨':'👁️',tr.x,tr.y+2)
    }
  }
  // wormholes
  for(let i=0;i<wormholes.length;i+=2){const w1=wormholes[i],w2=wormholes[i+1];if(!w1||!w2)continue;
    ctx.strokeStyle='rgba(120,80,200,.12)';ctx.lineWidth=1;ctx.setLineDash([4,8]);
    ctx.beginPath();ctx.moveTo(w1.x,w1.y);ctx.lineTo(w2.x,w2.y);ctx.stroke();ctx.setLineDash([]);
    for(const w of [w1,w2]){
      const rp=w.radius+Math.sin(w.pulse)*3;
      const wg=ctx.createRadialGradient(w.x,w.y,0,w.x,w.y,rp);
      wg.addColorStop(0,'rgba(200,150,255,.7)');wg.addColorStop(.5,'rgba(100,50,200,.35)');wg.addColorStop(1,'rgba(50,0,100,0)');
      ctx.beginPath();ctx.arc(w.x,w.y,rp,0,Math.PI*2);ctx.fillStyle=wg;ctx.fill();
      ctx.strokeStyle='rgba(180,130,255,.25)';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(w.x,w.y,rp*1.2,0,Math.PI*2);ctx.stroke();
    }
  }
  for(const s of spikes)drawSpike(s);
  for(const f of foods){ctx.beginPath();ctx.arc(f.x,f.y,f.radius,0,Math.PI*2);ctx.fillStyle=f.color;ctx.fill();ctx.strokeStyle='rgba(0,0,0,.2)';ctx.lineWidth=1;ctx.stroke()}
  for(const sf of superFoods){const pr=sf.radius+Math.sin(sf.pulse)*3;ctx.beginPath();ctx.arc(sf.x,sf.y,pr,0,Math.PI*2);const g=ctx.createRadialGradient(sf.x-4,sf.y-4,0,sf.x,sf.y,pr);g.addColorStop(0,'#fffbe6');g.addColorStop(.3,'#ffd700');g.addColorStop(1,'#b8860b');ctx.fillStyle=g;ctx.fill();ctx.shadowColor='#ffd700';ctx.shadowBlur=20;ctx.strokeStyle='rgba(255,215,0,.6)';ctx.lineWidth=2;ctx.stroke();ctx.shadowBlur=0}
  for(const e of ejected){
    const col=e.skin?skinForeColor(e.skin):e.color;
    const grad=ctx.createRadialGradient(e.x-2,e.y-2,0,e.x,e.y,e.radius);
    grad.addColorStop(0,'#fff');grad.addColorStop(.5,col);grad.addColorStop(1,darkenColor(e.color,40));
    ctx.beginPath();ctx.arc(e.x,e.y,e.radius,0,Math.PI*2);ctx.fillStyle=grad;ctx.globalAlpha=.8;ctx.fill();ctx.globalAlpha=1
  }
  const allCells=[];for(const p of players){if(!p.alive)continue;for(const c of p.cells){if(c.mass>1)allCells.push({cell:c,player:p})}}
  allCells.sort((a,b)=>a.cell.mass-b.cell.mass);
  for(const {cell:c,player:p} of allCells)drawCell(c,p);
  for(const pt of particles){ctx.globalAlpha=pt.life;ctx.beginPath();ctx.arc(pt.x,pt.y,pt.radius*pt.life,0,Math.PI*2);ctx.fillStyle=pt.color;ctx.fill()}
  }catch(e){}
  ctx.globalAlpha=1;ctx.restore();
  if(showMinimap)drawMinimap();
  // custom cursor overlay
  const cp=8+Math.sin(frameCount*.04)*1.5;
  ctx.beginPath();ctx.arc(mouse.x,mouse.y,cp,0,Math.PI*2);ctx.strokeStyle='rgba(78,204,163,.35)';ctx.lineWidth=1.5;ctx.fillStyle='rgba(78,204,163,.08)';ctx.fill();ctx.stroke();
  ctx.beginPath();ctx.arc(mouse.x,mouse.y,2,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,.5)';ctx.fill();
}

function drawBackground(){
  if(!drawBackground.points){const pts=[];for(let i=0;i<80;i++)pts.push({x:rand(0,CFG.MAP),y:rand(0,CFG.MAP),r:rand(1,4)});drawBackground.points=pts}
  for(const pt of drawBackground.points){ctx.beginPath();ctx.arc(pt.x,pt.y,pt.r,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,.03)';ctx.fill()}
}
function drawGrid(){
  const gs=80;ctx.strokeStyle='rgba(255,255,255,.04)';ctx.lineWidth=1;
  const sx=-Math.ceil(camera.x/gs)*gs,sy=-Math.ceil(camera.y/gs)*gs;
  for(let x=sx;x<W()+gs;x+=gs){const wx=x+camera.x;if(wx>=0&&wx<=CFG.MAP){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H());ctx.stroke()}}
  for(let y=sy;y<H()+gs;y+=gs){const wy=y+camera.y;if(wy>=0&&wy<=CFG.MAP){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W(),y);ctx.stroke()}}
}
function drawSpike(s){
  const r=s.radius,sp=s.spikes||6;ctx.beginPath();
  for(let i=0;i<sp*2;i++){const a=(i*Math.PI)/sp-Math.PI/2,rad=i%2===0?r:r*.5;i===0?ctx.moveTo(s.x+Math.cos(a)*rad,s.y+Math.sin(a)*rad):ctx.lineTo(s.x+Math.cos(a)*rad,s.y+Math.sin(a)*rad)}
  ctx.closePath();ctx.fillStyle='#2ecc71';ctx.fill();ctx.strokeStyle='#27ae60';ctx.lineWidth=2;ctx.stroke();
  ctx.beginPath();ctx.arc(s.x,s.y,r*.4,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,.2)';ctx.fill();
}

function getPlayerRank(pl){
  const sorted=players.filter(p=>p.alive&&p.cells.length).sort((a,b)=>totalMass(b)-totalMass(a));
  const idx=sorted.indexOf(pl);return idx<0?-1:idx+1;
}
function drawCell(c,p){
  const r=c.radius;if(r<1)return;const isPlayer=p===player,t=frameCount;
  const slf=0.6+(p.skinLevel||1)*0.4; // skin level factor 1.0-2.6
  const rank=getPlayerRank(p);const isTopRank=rank>0&&rank<=10;

  // ============ RANK-BASED EXCLUSIVE EFFECTS ============
  if(isTopRank&&r>15){
    if(rank===1){
      ctx.beginPath();ctx.arc(c.x,c.y,r*1.4,0,Math.PI*2);
      const ca=ctx.createRadialGradient(c.x,c.y,r*.8,c.x,c.y,r*1.4);
      ca.addColorStop(0,'rgba(255,215,0,0)');ca.addColorStop(.7,`rgba(255,215,0,${.08+Math.sin(t*.04)*.04})`);ca.addColorStop(1,'rgba(255,200,0,0)');
      ctx.fillStyle=ca;ctx.fill();
      ctx.font=`${Math.min(r*.45,20)}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillStyle='rgba(255,215,0,.85)';ctx.shadowColor='rgba(255,215,0,.5)';ctx.shadowBlur=12;ctx.fillText('👑',c.x,c.y-r*1.15);ctx.shadowBlur=0;
    }else if(rank<=3){
      ctx.beginPath();ctx.arc(c.x,c.y,r*1.3,0,Math.PI*2);
      ctx.strokeStyle=`rgba(255,255,255,${.1+Math.sin(t*.04)*.05})`;ctx.lineWidth=3;ctx.shadowColor=rank===2?'#c0c0c0':'#cd7f32';ctx.shadowBlur=18;ctx.stroke();ctx.shadowBlur=0;
    }
    for(let i=0;i<3;i++){const sa=t*.05+i*2.1;ctx.beginPath();ctx.arc(c.x+Math.cos(sa)*r*1.45,c.y+Math.sin(sa)*r*1.45,1.8,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,200,${.25+Math.sin(t*.06+i)*.2})`;ctx.fill()}
  }

  // ============ SKIN BACKGROUND (wings, auras, trails behind ball) ============
  if(r>15){
    // trail rendering
    if(p.skin!=='none'&&p.trail.length>1){
      for(let i=1;i<p.trail.length;i++){
        const pt=p.trail[i],pp=p.trail[i-1],lt=pt.life,alp=i/p.trail.length*lt;
        if(alp<.01)continue;
        if(p.skin==='phoenix'){ctx.beginPath();ctx.arc(pt.x,pt.y,pt.r*alp*.65,0,Math.PI*2);
          ctx.fillStyle=`rgba(255,${Math.floor(150*lt)},0,${alp*.38})`;ctx.fill()}
        else if(p.skin==='thunder'){ctx.beginPath();ctx.moveTo(pp.x,pp.y);ctx.lineTo(pt.x,pt.y);
          ctx.strokeStyle=`rgba(100,200,255,${alp*.28})`;ctx.lineWidth=2.5;ctx.shadowColor='rgba(100,200,255,.25)';ctx.shadowBlur=8;ctx.stroke();ctx.shadowBlur=0}
        else if(p.skin==='angel'){ctx.beginPath();ctx.arc(pt.x,pt.y,pt.r*alp*.4,0,Math.PI*2);
          ctx.fillStyle=`rgba(255,255,220,${alp*.35})`;ctx.fill()}
        else if(p.skin==='demon'){ctx.beginPath();ctx.arc(pt.x,pt.y,pt.r*alp*.65,0,Math.PI*2);
          ctx.fillStyle=`rgba(120,20,180,${alp*.28})`;ctx.fill()}
        else if(p.skin==='mech'){ctx.fillStyle=`rgba(180,190,200,${alp*.18})`;
          ctx.fillRect(pt.x-pt.r*alp*.35,pt.y-pt.r*alp*.35,pt.r*alp*.7,pt.r*alp*.7)}
        else if(p.skin==='aurora'){const hu=(t*.3+i*15)%360;ctx.beginPath();ctx.arc(pt.x,pt.y,pt.r*alp*.45,0,Math.PI*2);
          ctx.fillStyle=`hsla(${hu},80%,60%,${alp*.2})`;ctx.fill()}
        else if(p.skin==='stellar'){ctx.beginPath();ctx.arc(pt.x,pt.y,Math.max(1,pt.r*alp*.25),0,Math.PI*2);
          ctx.fillStyle=`rgba(255,255,200,${alp*.35})`;ctx.fill()}
        else if(p.skin==='ghost'){ctx.beginPath();ctx.arc(pt.x,pt.y,pt.r*alp*.75,0,Math.PI*2);
          ctx.fillStyle=`rgba(180,210,255,${alp*.14})`;ctx.fill()}
      }
    }
    const flap=Math.sin(t*.06)*.3+.7; // 0.4-1.0 for wing animation
    if(p.skin==='phoenix'){
      // flame wings - bigger and more vibrant
      for(let s=-1;s<=1;s+=2){
        const wp=slf*(1+Math.sin(t*.07)*.2);
        const cp1x=c.x+s*r*1.5*wp,cp1y=c.y-r*1.6*flap*wp;
        const cp2x=c.x+s*r*1.5*wp,cp2y=c.y+r*1.6*flap*wp;
        ctx.beginPath();ctx.moveTo(c.x+s*r*.3,c.y-r*.2);
        ctx.quadraticCurveTo(cp1x,cp1y,c.x+s*r*.85*wp,c.y-r*.08);
        ctx.quadraticCurveTo(cp2x,cp2y,c.x+s*r*.3,c.y+r*.2);
        ctx.closePath();
        const wg=ctx.createLinearGradient(c.x,c.y-r,c.x,c.y+r);
        const aO=Math.min(.85,slf*.4);
        wg.addColorStop(0,`rgba(255,220,80,${aO})`);wg.addColorStop(.35,`rgba(255,120,0,${aO})`);wg.addColorStop(.65,`rgba(255,40,0,${aO*.65})`);wg.addColorStop(1,'rgba(180,0,0,0)');
        ctx.fillStyle=wg;ctx.shadowColor='rgba(255,150,0,.45)';ctx.shadowBlur=25;ctx.fill();ctx.shadowBlur=0;
      }
    }
    if(p.skin==='angel'){
      // feather wings - more and glowing
      for(let s=-1;s<=1;s+=2){
        const fCount=Math.floor(3+slf*1.5);
        for(let f=0;f<fCount;f++){
          const fy=c.y+(f-(fCount-1)/2)*r*.32*flap;
          ctx.beginPath();ctx.ellipse(c.x+s*r*(.3+f*.25)*slf*1.15,fy,r*.28*slf*.85,r*.2*(1.1-f*.1)*slf*.9,s*.3,0,Math.PI*2);
          ctx.fillStyle=`rgba(255,255,245,${Math.min(.6,slf*.22)})`;
          ctx.shadowColor='rgba(255,255,200,.18)';ctx.shadowBlur=10;ctx.fill();ctx.shadowBlur=0;
        }
      }
    }
    if(p.skin==='demon'){
      // bat wings - more menacing
      for(let s=-1;s<=1;s+=2){
        ctx.beginPath();ctx.moveTo(c.x+s*r*.25,c.y-r*.2);
        ctx.lineTo(c.x+s*r*(.65+slf*.4),c.y-r*flap*slf);
        ctx.lineTo(c.x+s*r*.75,c.y-r*.15);
        ctx.lineTo(c.x+s*r*(.65+slf*.4),c.y+r*flap*slf);
        ctx.lineTo(c.x+s*r*.25,c.y+r*.2);
        ctx.closePath();
        ctx.fillStyle='rgba(80,15,120,.6)';ctx.shadowColor='rgba(120,0,180,.35)';ctx.shadowBlur=18;ctx.fill();ctx.shadowBlur=0;
        ctx.strokeStyle='rgba(180,50,200,.4)';ctx.lineWidth=2.5;ctx.stroke();
      }
    }
    if(p.skin==='mech'){
      // mechanical panels - more detailed
      const deploy=Math.min(1,flap*1.2)*slf*.75;
      for(let s=-1;s<=1;s+=2){
        const ox=c.x+s*r*(.4+deploy*.35),oy=c.y;
        ctx.beginPath();ctx.moveTo(c.x+s*r*.25,c.y-r*.3);
        ctx.lineTo(ox+s*r*.85*deploy,oy-r*1.05*deploy);
        ctx.lineTo(ox+s*r*1.05*deploy,oy);
        ctx.lineTo(ox+s*r*.85*deploy,oy+r*1.05*deploy);
        ctx.lineTo(c.x+s*r*.25,c.y+r*.3);
        ctx.closePath();
        ctx.fillStyle='rgba(130,145,155,.55)';ctx.shadowColor='rgba(180,200,220,.12)';ctx.shadowBlur=12;ctx.fill();ctx.shadowBlur=0;
        ctx.strokeStyle='rgba(220,230,240,.4)';ctx.lineWidth=2;ctx.stroke();
      }
    }
    if(p.skin==='ghost'){
      // afterimage - more ghostly
      for(let i=1;i<=3;i++){
        const off=t*.25+i*1.2;ctx.beginPath();
        ctx.arc(c.x+Math.sin(off)*r*.22*slf,c.y+Math.cos(off)*r*.22*slf,r*(1-i*.05),0,Math.PI*2);
        ctx.fillStyle=`rgba(180,210,255,${.09-i*.025})`;ctx.fill();
      }
    }
  }

  // ============ MAIN CELL ============
  const grad=ctx.createRadialGradient(c.x-r*.3,c.y-r*.3,0,c.x,c.y,r);
  if(p.skin==='aurora'&&r>15){
    const hue=(t*.5)%360;
    grad.addColorStop(0,`hsla(${hue},80%,70%,.9)`);grad.addColorStop(.5,`hsla(${(hue+60)%360},70%,50%,.8)`);grad.addColorStop(1,`hsla(${(hue+120)%360},60%,30%,.7)`);
    ctx.shadowColor=`hsla(${hue},80%,60%,.3)`;ctx.shadowBlur=r*.15;
  }else if(p.skin==='mech'&&r>15){
    grad.addColorStop(0,'rgba(200,210,220,.9)');grad.addColorStop(.5,'rgba(120,130,140,.85)');grad.addColorStop(1,'rgba(50,55,60,.8)');
  }else if(p.skin==='ghost'&&r>15){
    grad.addColorStop(0,'rgba(200,220,255,.6)');grad.addColorStop(.5,'rgba(140,170,220,.5)');grad.addColorStop(1,'rgba(80,110,180,.4)');
  }else if(p.skin==='stellar'&&r>15){
    grad.addColorStop(0,lightenColor('#2d1b69',30));grad.addColorStop(.5,'#1a0a3e');grad.addColorStop(1,'#0d001a');
  }else if(p.skin==='demon'&&r>15){
    grad.addColorStop(0,'#4a1a6b');grad.addColorStop(.5,'#2d0d45');grad.addColorStop(1,'#1a0525');
  }else if(p.skin==='phoenix'&&r>15){
    grad.addColorStop(0,'#ffeb99');grad.addColorStop(.4,'#ff8c00');grad.addColorStop(1,'#cc3300');
  }else if(p.skin==='thunder'&&r>15){
    grad.addColorStop(0,'#e0ffff');grad.addColorStop(.4,'#4fc3f7');grad.addColorStop(1,'#1565c0');
  }else if(p.skin==='angel'&&r>15){
    grad.addColorStop(0,'#ffffff');grad.addColorStop(.4,'#fff8e7');grad.addColorStop(1,'#ffe0b2');
  }else{
    grad.addColorStop(0,lightenColor(p.color,40));grad.addColorStop(.7,p.color);grad.addColorStop(1,darkenColor(p.color,40));
  }
  ctx.beginPath();ctx.arc(c.x,c.y,r,0,Math.PI*2);ctx.fillStyle=grad;ctx.fill();
  ctx.shadowBlur=0;

  // ============ SKIN FOREGROUND (overlays, rings, details) ============
  if(r>15){
    if(p.skin==='phoenix'){
      // inner fire glow - more intense
      const fp=.6+Math.sin(t*.05)*.4;
      const g=ctx.createRadialGradient(c.x,c.y,0,c.x,c.y,r*.85);
      g.addColorStop(0,`rgba(255,255,200,${.35*fp})`);g.addColorStop(.5,`rgba(255,120,0,${.25*fp})`);g.addColorStop(1,'rgba(255,0,0,0)');
      ctx.beginPath();ctx.arc(c.x,c.y,r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
      // floating embers - more and larger
      for(let i=0;i<7;i++){const a=t*.04+i*.9;ctx.beginPath();ctx.arc(c.x+Math.cos(a)*r*.65,c.y+Math.sin(a)*r*.65,rand(2,r*.09),0,Math.PI*2);
        ctx.fillStyle=`rgba(255,${randI(120,220)},0,${.35+Math.sin(a+t*.06)*.25})`;ctx.shadowColor='rgba(255,150,0,.5)';ctx.shadowBlur=14;ctx.fill();ctx.shadowBlur=0}
    }
    if(p.skin==='thunder'){
      // lightning bolts - more and brighter
      for(let i=0;i<9;i++){
        const a=i*Math.PI*2/9+t*.05;ctx.beginPath();
        let cx=c.x+Math.cos(a)*r*.9,cy=c.y+Math.sin(a)*r*.9;
        ctx.moveTo(cx,cy);
        for(let j=0;j<5;j++){const ja=a+j*.5+rand(-.4,.4);cx+=Math.cos(ja)*rand(r*.12,r*.3);cy+=Math.sin(ja)*rand(r*.12,r*.3);ctx.lineTo(cx,cy)}
        ctx.strokeStyle='rgba(180,230,255,.75)';ctx.lineWidth=Math.max(2.5,r*.055);ctx.shadowColor='rgba(100,200,255,.65)';ctx.shadowBlur=18;ctx.stroke();ctx.shadowBlur=0;
      }
      // electrostatic ring
      ctx.beginPath();ctx.arc(c.x,c.y,r*.88,0,Math.PI*2);
      ctx.strokeStyle=`rgba(200,240,255,${.22+Math.sin(t*.06)*.15})`;ctx.lineWidth=Math.max(2.5,r*.045);ctx.setLineDash([3,4]);ctx.shadowColor='rgba(100,200,255,.25)';ctx.shadowBlur=10;ctx.stroke();ctx.shadowBlur=0;ctx.setLineDash([]);
    }
    if(p.skin==='angel'){
      // rotating halo - bigger
      for(let i=0;i<2;i++){const off=i*Math.PI,hs=r*1.3;ctx.beginPath();ctx.ellipse(c.x,c.y+r*.05,hs,hs*.38,off+t*.012,0,Math.PI*2);
        ctx.strokeStyle=`rgba(255,215,0,${.4+i*.15})`;ctx.lineWidth=Math.max(3,r*.055);ctx.shadowColor='rgba(255,215,0,.4)';ctx.shadowBlur=22;ctx.stroke();ctx.shadowBlur=0}
      // floating light orbs - more
      for(let i=0;i<5;i++){const ad=i*1.257+t*.035;ctx.beginPath();ctx.arc(c.x+Math.cos(ad)*r*1.0,c.y+Math.sin(ad)*r*1.0+r*.05,rand(2,4),0,Math.PI*2);
        ctx.fillStyle=`rgba(255,255,220,${.45+Math.sin(t*.05+i)*.25})`;ctx.shadowColor='rgba(255,255,200,.45)';ctx.shadowBlur=10;ctx.fill();ctx.shadowBlur=0}
    }
    if(p.skin==='demon'){
      // pulsing red eyes - more prominent
      if(r>20){const eo=Math.sin(t*.04)*.5;ctx.font=`${r*.45}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillStyle=`rgba(255,0,0,${.75+Math.sin(t*.06)*.3})`;ctx.shadowColor='rgba(255,0,0,.55)';ctx.shadowBlur=18;ctx.fillText('👀',c.x,c.y-2+eo);ctx.shadowBlur=0}
      // shadow aura - wider pulse
      const sa=1.08+Math.sin(t*.04)*.06;
      ctx.beginPath();ctx.arc(c.x,c.y,r*sa,0,Math.PI*2);
      ctx.strokeStyle=`rgba(150,0,255,${.15+Math.sin(t*.05)*.08})`;ctx.lineWidth=Math.max(5,r*.07);ctx.shadowColor='rgba(100,0,200,.25)';ctx.shadowBlur=28;ctx.stroke();ctx.shadowBlur=0;
    }
    if(p.skin==='mech'){
      // thruster glow - bigger
      for(let s=-1;s<=1;s+=2){
        const ang=t*.04*s,td=r*.42;
        const tx=c.x+Math.cos(ang)*td,ty=c.y+Math.sin(ang)*td+r*.42;
        const g2=ctx.createRadialGradient(tx,ty,0,tx,ty,r*.28);
        g2.addColorStop(0,`rgba(255,200,80,${.55+Math.sin(t*.08)*.25})`);g2.addColorStop(1,'rgba(255,50,0,0)');
        ctx.beginPath();ctx.arc(tx,ty,r*.28,0,Math.PI*2);ctx.fillStyle=g2;ctx.shadowColor='rgba(255,150,0,.35)';ctx.shadowBlur=14;ctx.fill();ctx.shadowBlur=0;
      }
      // mechanical lines - more
      ctx.strokeStyle='rgba(200,210,220,.12)';ctx.lineWidth=1.5;
      for(let i=0;i<6;i++){const a=i*Math.PI/3;ctx.beginPath();ctx.moveTo(c.x+Math.cos(a)*r*.25,c.y+Math.sin(a)*r*.25);ctx.lineTo(c.x+Math.cos(a)*r*.92,c.y+Math.sin(a)*r*.92);ctx.stroke()}
    }
    if(p.skin==='aurora'){
      // flowing aurora strands - more and brighter
      for(let i=0;i<5;i++){
        const a=i*1.5+t*.02,amp=r*.55+Math.sin(a)*r*.3;
        ctx.beginPath();ctx.moveTo(c.x-r,c.y+Math.sin(a)*r*.4);
        for(let x=-r;x<=r;x+=2){
          const y=c.y+Math.sin(a+x*.02)*amp;
          ctx.lineTo(c.x+x,y);
        }
        const hue=(t*.5+i*30)%360;
        ctx.strokeStyle=`hsla(${hue},80%,65%,${.22+Math.sin(t*.05+i)*.12})`;
        ctx.lineWidth=Math.max(3.5,r*.065);ctx.shadowColor=`hsla(${hue},80%,55%,.25)`;ctx.shadowBlur=18;ctx.stroke();ctx.shadowBlur=0;
      }
    }
    if(p.skin==='stellar'){
      // orbiting stars - more stars, bigger
      for(let i=0;i<10;i++){
        const a=i*Math.PI*2/10+t*.018,dist=r*.72+Math.sin(t*.025+i)*r*.3;
        const sx=c.x+Math.cos(a)*dist,sy=c.y+Math.sin(a)*dist;
        const sz=Math.max(2.5,Math.sin(t*.04+i)*r*.09+3.5);
        ctx.beginPath();for(let j=0;j<5;j++){const sa=j*Math.PI*2/5-Math.PI/2,rad=j%2===0?sz:sz*.4;j===0?ctx.moveTo(sx+Math.cos(sa)*rad,sy+Math.sin(sa)*rad):ctx.lineTo(sx+Math.cos(sa)*rad,sy+Math.sin(sa)*rad)}
        ctx.closePath();
        const bright=.5+Math.sin(t*.03+i)*.4;
        ctx.fillStyle=`rgba(255,255,200,${bright})`;ctx.shadowColor='rgba(200,200,255,.55)';ctx.shadowBlur=14;ctx.fill();ctx.shadowBlur=0;
      }
      // galaxy spiral - bigger
      ctx.beginPath();for(let a=0;a<Math.PI*10;a+=.06){const td=r*.2+a*.04;ctx.lineTo(c.x+Math.cos(a)*td,c.y+Math.sin(a)*td)}
      ctx.strokeStyle='rgba(200,180,255,.18)';ctx.lineWidth=2.5;ctx.stroke();
    }
    if(p.skin==='ghost'){
      // wispy inner glow - brighter pulse
      const gg=ctx.createRadialGradient(c.x,c.y,0,c.x,c.y,r*.65);
      gg.addColorStop(0,`rgba(200,230,255,${.22+Math.sin(t*.05)*.1})`);gg.addColorStop(1,'rgba(150,180,255,0)');
      ctx.beginPath();ctx.arc(c.x,c.y,r,0,Math.PI*2);ctx.fillStyle=gg;ctx.fill();
      // floating wisps - more
      for(let i=0;i<5;i++){const a=t*.04+i*1.26;ctx.beginPath();ctx.arc(c.x+Math.cos(a)*r*.78,c.y+Math.sin(a)*r*.78,rand(3,r*.12),0,Math.PI*2);
        ctx.fillStyle=`rgba(180,210,255,${.1+Math.sin(t*.04+i)*.07})`;ctx.fill()}
    }
  }

  // ============ STANDARD OVERLAYS ============
  ctx.beginPath();ctx.arc(c.x-r*.25,c.y-r*.25,r*.3,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,.12)';ctx.fill();
  ctx.strokeStyle=isPlayer?'rgba(255,255,255,.8)':'rgba(255,255,255,.2)';ctx.lineWidth=isPlayer?3:1.5;ctx.stroke();
  // Top 10 golden name glow
  if(isTopRank){ctx.shadowColor='rgba(255,215,0,.35)';ctx.shadowBlur=15}
  const fs=Math.max(11,Math.min(r*.7,28));
  ctx.fillStyle='#fff';ctx.font=`bold ${fs}px "Microsoft YaHei",Arial,sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.shadowColor='rgba(0,0,0,.85)';ctx.shadowBlur=5;
  const mc=getMaxCell(p);if(c===mc||p.cells.length===1)ctx.fillText(p.name,c.x,c.y-4);
  ctx.shadowBlur=0;
  if(p.sprintTimer>0){ctx.beginPath();ctx.arc(c.x,c.y,r+4,0,Math.PI*2);ctx.strokeStyle='rgba(255,255,255,.2)';ctx.lineWidth=2;ctx.setLineDash([5,5]);ctx.stroke();ctx.setLineDash([])}
  // faint direction path
  if(isPlayer&&c===getMaxCell(p)&&!chatOpen){
    const wx=camera.x+mouse.x,wy=camera.y+mouse.y;
    const dx=wx-c.x,dy=wy-c.y,d=Math.hypot(dx,dy);
    if(d>r+10){const a=Math.atan2(dy,dx);ctx.beginPath();ctx.moveTo(c.x+Math.cos(a)*(r+2),c.y+Math.sin(a)*(r+2));
      ctx.lineTo(wx,wy);ctx.setLineDash([4,8]);ctx.strokeStyle='rgba(255,255,255,.08)';ctx.lineWidth=1;ctx.stroke();ctx.setLineDash([])}
  }
}

function drawMinimap(){
  const s=160,pad=10,mx=W()-s-pad,my=H()-s-pad-40,scale=s/CFG.MAP;
  ctx.fillStyle='rgba(0,0,0,.55)';ctx.strokeStyle='rgba(255,255,255,.15)';ctx.lineWidth=1;
  ctx.beginPath();ctx.roundRect(mx,my,s,s,6);ctx.fill();ctx.stroke();
  // wormhole connecting lines
  for(let i=0;i<wormholes.length;i+=2){const w1=wormholes[i],w2=wormholes[i+1];if(!w1||!w2)continue;
    ctx.beginPath();ctx.moveTo(mx+w1.x*scale,my+w1.y*scale);ctx.lineTo(mx+w2.x*scale,my+w2.y*scale);
    ctx.strokeStyle='rgba(150,100,255,.15)';ctx.lineWidth=1;ctx.setLineDash([2,3]);ctx.stroke();ctx.setLineDash([]);
  }
  for(const p of players){if(!p.alive||!p.cells.length)continue;
    const cx=p.cells.reduce((s,c)=>s+c.x,0)/p.cells.length,cy=p.cells.reduce((s,c)=>s+c.y,0)/p.cells.length;
    ctx.beginPath();ctx.arc(mx+cx*scale,my+cy*scale,Math.max(2,Math.sqrt(totalMass(p))*scale*2),0,Math.PI*2);
    ctx.fillStyle=p===player?'#4ecca3':'#ff6b6b';ctx.fill()
    if(p===player||totalMass(p)>300){ctx.fillStyle='rgba(255,255,255,.4)';ctx.font='8px Arial';ctx.textAlign='center';ctx.fillText(p.name,mx+cx*scale,my+cy*scale-5)}
  }
  for(const s2 of spikes){ctx.fillStyle='#2ecc71';ctx.fillRect(mx+s2.x*scale-1,my+s2.y*scale-1,3,3)}
  for(const sf of superFoods){ctx.beginPath();ctx.arc(mx+sf.x*scale,my+sf.y*scale,3,0,Math.PI*2);ctx.fillStyle='#ffd700';ctx.fill()}
  for(const sr of secretRealms){if(sr.used)continue;ctx.fillStyle='rgba(255,215,0,.5)';ctx.beginPath();ctx.arc(mx+sr.x*scale,my+sr.y*scale,4,0,Math.PI*2);ctx.fill()}
  for(const wh of wormholes){ctx.fillStyle='rgba(150,100,255,.5)';ctx.beginPath();ctx.arc(mx+wh.x*scale,my+wh.y*scale,2.5,0,Math.PI*2);ctx.fill()}
  ctx.strokeStyle='rgba(255,255,255,.2)';ctx.lineWidth=1;ctx.strokeRect(mx+camera.x*scale,my+camera.y*scale,W()*scale,H()*scale);
  // legend
  ctx.fillStyle='rgba(0,0,0,.4)';ctx.beginPath();ctx.roundRect(mx+4,my+s-49,54,45,4);ctx.fill();
  ctx.font='8px Arial';const lx=mx+10,ly=my+s-43;ctx.textAlign='left';
  ctx.fillStyle='#4ecca3';ctx.beginPath();ctx.arc(lx+4,ly+3,2.5,0,Math.PI*2);ctx.fill()
  ctx.fillStyle='rgba(255,255,255,.5)';ctx.fillText('玩家',lx+10,ly+5);
  ctx.fillStyle='#ff6b6b';ctx.beginPath();ctx.arc(lx+4,ly+13,2.5,0,Math.PI*2);ctx.fill()
  ctx.fillStyle='rgba(255,255,255,.5)';ctx.fillText('敌人',lx+10,ly+15);
  ctx.fillStyle='rgba(255,215,0,.5)';ctx.beginPath();ctx.arc(lx+4,ly+23,3,0,Math.PI*2);ctx.fill()
  ctx.fillStyle='rgba(255,255,255,.5)';ctx.fillText('秘境',lx+10,ly+25);
  ctx.fillStyle='rgba(150,100,255,.5)';ctx.beginPath();ctx.arc(lx+4,ly+33,2.5,0,Math.PI*2);ctx.fill()
  ctx.fillStyle='rgba(255,255,255,.5)';ctx.fillText('虫洞',lx+10,ly+35);
  ctx.fillStyle='#4ecca3';ctx.font='9px Arial';ctx.textAlign='right';ctx.fillText('小地图',mx+s-4,my+12);
}

// ============ COLOR HELPERS ============
function lightenColor(hex,amt){let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgb(${Math.min(255,r+amt)},${Math.min(255,g+amt)},${Math.min(255,b+amt)})`}
function darkenColor(hex,amt){let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgb(${Math.max(0,r-amt)},${Math.max(0,g-amt)},${Math.max(0,b-amt)})`}
function skinForeColor(skin){
  const m={'phoenix':'#ff6600','thunder':'#4fc3f7','angel':'#ffe0b2','demon':'#7b1fa2','mech':'#90a4ae','aurora':'#ce93d8','stellar':'#b39ddb','ghost':'#b0c4de'};
  return m[skin]||'#ffffff';
}

// ============ HUD ============
function updateLeaderboard(){
  const sorted=players.filter(p=>p.alive&&p.cells.length).sort((a,b)=>totalMass(b)-totalMass(a));
  let html='<div class="title">🏆 排行榜</div>';
  sorted.slice(0,10).forEach((p,i)=>{
    const bc=p.ownedBuffs?p.ownedBuffs.length:0;
    html+=`<div class="${p===player?'entry me':'entry'}">${i+1}. ${p.name} — ${Math.floor(totalMass(p))}${bc?` <span style="font-size:9px;color:rgba(255,215,0,.5)">✨${bc}</span>`:''}</div>`
  });
  leaderboardEl.innerHTML=html;
}
function updateLevelDisplay(){
  const lv=playerData.level,r=getRank(lv);
  levelDisplay.innerHTML=`<span style="color:${['#cd7f32','#c0c0c0','#ffd700','#00ffff','#ff69b4','#ff4500','#ff0000'][r]||'#ffd700'}">◆ ${RANK_NAMES[r]||'王者'}</span> Lv.${lv}`+
    (lv<50?` <span style="color:#555">| ${playerData.exp}/${expForNext(lv)}</span>`:'');
}

// ============ GAME OVER ============
function gameOver(victim){
  killStreak=0;
  gameRunning=false;if(animId)cancelAnimationFrame(animId);
  escHint.style.display='none';
  const mass=Math.floor(totalMass(player));
  finalMass.textContent=mass;
  finalKills.textContent=player.kills;
  finalFood.textContent=player.foodEaten;
  finalSplits.textContent=player.splitCount;
  finalTime.textContent=Math.floor((Date.now()-gameStartTime)/1000);

  const expGainNum=Math.floor(mass/5+player.kills*15+10);
  addExp(expGainNum);
  expGain.textContent=`经验 +${expGainNum}`;
  playerData.games++;if(mass>playerData.maxMass)playerData.maxMass=mass;playerData.totalKills+=player.kills;
  saveData();

  if(checkAchievement('first_game',true))announce('🏆 解锁成就: 初出茅庐','#ffd700');
  if(playerData.games>=10&&checkAchievement('games_10',true))announce('🏆 解锁成就: 忠实玩家','#ffd700');

  const achDiv=document.getElementById('achievements');
  achDiv.innerHTML=playerData.achievements.slice(-3).map(a=>`<div class="achieve">⭐ ${a}</div>`).join('');
  sfxDeath();deathScreen.style.display='flex';document.getElementById('buffPanel').classList.remove('open');
}

// ============ START GAME ============
function startGame(name){
  myName=name||'玩家';
  startScreen.style.display='none';deathScreen.style.display='none';
  foods=[];spikes=[];superFoods=[];ejected=[];players=[];particles=[];replayData=[];
  secretRealms=[];wormholes=[];srTimer=Date.now();whTimer=Date.now();killStreak=0;shakeIntensity=0;foodMultLevel=0;inRealm=false;realmReturn=null;realmTreasures=[];
  player=null;camera={x:0,y:0};frameCount=0;decayTimer=0;superFoodTimer=0;
  isReplay=false;isSpectating=false;escHint.style.display='block';
  if(replayId)cancelAnimationFrame(replayId);if(spectateId)cancelAnimationFrame(spectateId);

  initAudio();
  sfxEnabled=sfxToggle.checked;showMinimap=mapToggle.checked;
  const botCount=parseInt(aiCountSel.value);

  player=createPlayer('player',myName,false);
  if(playerData.unlocks.length)player.color=playerData.unlocks[playerData.unlocks.length-1];
  player.cells=[createCell(CFG.MAP/2,CFG.MAP/2,30)];
  players.push(player);

  const botNames=['小萌球','大胖球','闪电球','暗影球','火焰球','冰霜球','雷电球','旋风球','岩石球','水晶球','暗黑球','泡泡球','毒液球','弹性球','流星球','幻影球','钢铁球','寒冰球'];
  for(let i=0;i<botCount;i++){const bot=createPlayer('bot_'+i,botNames[i%botNames.length],true);bot.cells=[createCell(rand(100,CFG.MAP-100),rand(100,CFG.MAP-100),rand(10,25))];players.push(bot)}

  for(let i=0;i<CFG.SPIKE_COUNT;i++)spikes.push(createSpike());

  player.buffData=createDefaultBuffData();player.ownedBuffs=[];
  buffTimer=Date.now();buffInterval=15000;buffPickCount=0;
  CFG.DECAY_RATE=0.002;CFG.DECAY_INTERVAL=3500;CFG.SUPER_FOOD_INTERVAL=12000;CFG.FOOD_COUNT=900;
  for(let i=0;i<5;i++){const bot=createPlayer('boss_'+i,['暴走球','狂怒球','毁灭球','混沌球','暗影'][i],true);bot.cells=[createCell(rand(100,CFG.MAP-100),rand(100,CFG.MAP-100),rand(25,45))];players.push(bot)}

  spawnFoods();
  const lv=playerData.level;document.querySelector('#startScreen .rank').textContent=`${RANK_NAMES[getRank(lv)]} Lv.${lv}`;

  gameStartTime=Date.now();
  gameRunning=true;if(animId)cancelAnimationFrame(animId);gameLoop();
}

// ============ BUFF SELECTION ============
function showBuffSelection(){
  if(!player||!player.alive)return;
  const candidates=BUFF_POOL.filter(b=>b.tier===1||Math.random()<.5);
  const pool=[];const used=new Set();
  while(pool.length<3&&used.size<BUFF_POOL.length){
    const b=candidates.length?candidates[randI(0,candidates.length-1)]:BUFF_POOL[randI(0,BUFF_POOL.length-1)];
    if(!used.has(b.id)){used.add(b.id);pool.push(b)}
  }
  while(pool.length<3&&used.size<BUFF_POOL.length){
    const b=BUFF_POOL[randI(0,BUFF_POOL.length-1)];
    if(!used.has(b.id)){pool.push(b)}
  }
  const container=document.getElementById('buffCards');container.innerHTML='';
  pool.forEach((b,i)=>{
    const card=document.createElement('div');
    card.className='buff-card'+(b.tier===2?' tier2':'');
    card.innerHTML=`
      <span class="icon">${b.icon}</span>
      <div class="name">${b.name}</div>
      <div class="desc">${b.desc}</div>
      <span class="rarity ${b.tier===1?'t1':'t2'}">${b.tier===1?'普通':'稀有'}</span>
    `;
    card.addEventListener('click',()=>selectBuff(i,pool));
    card.addEventListener('mouseenter',()=>playTone(600,.05,'sine',.05));
    container.appendChild(card);
  });
  document.getElementById('buffPanel').classList.add('open');
  buffCountdownEl=document.getElementById('buffTime');
  if(buffCountdownEl)buffCountdownEl.textContent='';
  gameRunning=false;sfxAchieve();
}
function selectBuff(idx,pool){
  if(!player||!player.alive)return;
  const b=pool[idx];
  b.apply(player.buffData);
  player.ownedBuffs.push(b.id);
  if(b.id==='bonusMass'&&player.cells.length){const mc=getMaxCell(player);mc.mass+=5;updateRadius(mc)}
  if(b.id==='maxCell'){for(const c of player.cells){c.mass+=2;updateRadius(c)}}
  // visual burst
  const mc=getMaxCell(player);
  if(mc){for(let i=0;i<30;i++){const a=rand(0,Math.PI*2);particles.push({x:mc.x,y:mc.y,vx:Math.cos(a)*rand(2,8),vy:Math.sin(a)*rand(2,8),radius:rand(2,5),color:`hsl(${randI(40,60)},100%,${randI(60,80)}%)`,life:1,decay:.015})}}
  // ALL alive bots get 1 random buff each round
  const bots=players.filter(p=>p!==player&&p.isBot&&p.alive);
  for(const bot of bots){
    const rb=BUFF_POOL[randI(0,BUFF_POOL.length-1)];
    rb.apply(bot.buffData);
    bot.ownedBuffs.push(rb.id);
    if(bot.ownedBuffs.length===5)announce(`🔥 ${bot.name} 获得 5 层强化！`,'#ff6b6b');
    if(bot.ownedBuffs.length===10)announce(`💀 ${bot.name} 已无人能挡！`,'#ff4444');
  }
  // interval shortens each pick (15s → min 8s)
  buffPickCount++;
  buffInterval=Math.max(8000,15000-buffPickCount*500);
  document.getElementById('buffPanel').classList.remove('open');
  sfxEat();
  buffTimer=Date.now();
  gameRunning=true;
  announce(`✨ 获得强化: ${b.icon} ${b.name}`,'#ffd700');
}

// ============ PAUSE ============
function togglePause(){
  if(!gameRunning&&!isPaused)return;
  isPaused=!isPaused;
  document.getElementById('pauseScreen').classList.toggle('open',isPaused);
  if(isPaused){document.getElementById('pauseSfxBtn').textContent=sfxEnabled?'🔊 音效':'🔇 音效';document.getElementById('pauseMapBtn').textContent=showMinimap?'🗺 小地图':'🚫 小地图'}
  gameRunning=!isPaused;
}
document.getElementById('pauseResumeBtn').addEventListener('click',()=>{if(isPaused)togglePause()});
document.getElementById('pauseSfxBtn').addEventListener('click',()=>{
  sfxEnabled=!sfxEnabled;sfxToggle.checked=sfxEnabled;
  document.getElementById('pauseSfxBtn').textContent=sfxEnabled?'🔊 音效':'🔇 音效';
});
document.getElementById('pauseMapBtn').addEventListener('click',()=>{
  showMinimap=!showMinimap;mapToggle.checked=showMinimap;
  document.getElementById('pauseMapBtn').textContent=showMinimap?'🗺 小地图':'🚫 小地图';
});
document.getElementById('pauseQuitBtn').addEventListener('click',()=>{
  if(isPaused)togglePause();
  quitGame();
});

function gameLoop(){update();draw();animId=requestAnimationFrame(gameLoop)}

  const cx=player.cells.reduce((s,c)=>s+c.x,0)/player.cells.length;

// keyboard
window.addEventListener('keydown',e=>{
  if(e.key===' '&&!e.repeat){e.preventDefault();if(gameRunning){doSplit(player);lastSplitTime=Date.now()}}
  if(e.key==='w'||e.key==='W'){if(gameRunning)doEject(player)}
  if(e.key==='Shift'){e.preventDefault();if(gameRunning)doSprint(player)}
  if(e.key==='Enter'&&!isReplay&&!isSpectating){e.preventDefault();if(gameRunning&&player&&player.alive){if(chatOpen)closeChat();else openChat()}}
  if(e.key==='Escape'){if(chatOpen){closeChat()}else if(isReplay){isReplay=false;if(replayId)cancelAnimationFrame(replayId);deathScreen.style.display='flex';spectateHint.textContent=''}else if(isSpectating){stopSpectate()}else if(gameRunning&&!document.getElementById('buffPanel').classList.contains('open')){togglePause()}else if(isPaused){togglePause()}}
  // number keys for chat
  if(chatOpen){const n=parseInt(e.key);if(n>=1&&n<=CHAT_MSGS.length){e.preventDefault();sendChat(n-1)}}
  keys[e.key]=true;
});
window.addEventListener('keyup',e=>{keys[e.key]=false});

canvas.addEventListener('contextmenu',e=>{e.preventDefault();if(gameRunning)doSprint(player)});

// replay & spectate buttons
replayBtn.addEventListener('click',()=>{
  if(replayData.length>10)startReplay();
});
spectateBtn.addEventListener('click',()=>{startSpectate()});

// ============ DEMO MODE (main menu background) ============
function startDemo(){
  if(isDemo)return;isDemo=true;
  foods=[];spikes=[];superFoods=[];ejected=[];players=[];particles=[];camera={x:CFG.MAP/2-W()/2,y:CFG.MAP/2-H()/2};zoom=.8;frameCount=0;decayTimer=0;superFoodTimer=0;gameStartTime=Date.now();foodMultLevel=0;
  const names=['小萌球','大胖球','闪电球','暗影球','火焰球','冰霜球','雷电球','旋风球','岩石球','水晶球','暗黑球','泡泡球','毒液球','弹性球','流星球','幻影球','暴走球','狂怒球','毁灭球'];
  for(let i=0;i<14;i++){const bot=createPlayer('demo_'+i,names[i%names.length],true);bot.personality=0;bot.cells=[createCell(rand(100,CFG.MAP-100),rand(100,CFG.MAP-100),rand(15,30))];players.push(bot)}
  // elite chaos bots
  for(let i=0;i<3;i++){const bot=createPlayer('demoE_'+i,['💀暴走','🔥狂怒','☠️毁灭'][i],true);bot.personality=0;bot.cells=[createCell(rand(100,CFG.MAP-100),rand(100,CFG.MAP-100),rand(35,55))];players.push(bot)}
  for(let i=0;i<CFG.SPIKE_COUNT+10;i++)spikes.push(createSpike());
  spawnFoods();gameRunning=true;demoLoop();
}
function stopDemo(){
  isDemo=false;gameRunning=false;if(demoId)cancelAnimationFrame(demoId);demoId=null;
  foods=[];spikes=[];superFoods=[];ejected=[];players=[];particles=[];
}
function demoLoop(){
  frameCount++;
  for(const p of players){if(p.isBot&&p.alive){updateBot(p);movePlayer(p);processMerge(p);
    // extra aggression: more splits, more sprint
    if(p.alive&&p.cells.length&&!p.sprintCooldown&&frameCount%180<10&&Math.random()<.4){p.sprintTimer=CFG.SPRINT_DURATION;p.sprintCooldown=CFG.SPRINT_COOLDOWN}
  }}
  // record trails for skin effects
  for(const p of players){if(p.alive&&p.skin!=='none'&&p.cells.length){const mc=getMaxCell(p);
    if(frameCount%2===0){p.trail.push({x:mc.x,y:mc.y,life:1,r:mc.radius});if(p.trail.length>18)p.trail.shift()}
    for(let i=p.trail.length-1;i>=0;i--){p.trail[i].life*=.93;if(p.trail[i].life<.01)p.trail.splice(i,1)}
  }}
  decayTimer+=16;if(decayTimer>=CFG.DECAY_INTERVAL-500){processDecay();decayTimer=0}
  superFoodTimer+=16;if(superFoodTimer>=CFG.SUPER_FOOD_INTERVAL&&superFoods.length<3){superFoods.push(createSuperFood());superFoodTimer=0}
  processEating();spawnFoods();
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vx*=.96;p.vy*=.96;p.life-=p.decay;if(p.life<=0)particles.splice(i,1)}
  if(particles.length>300)particles.splice(0,particles.length-300);
  for(const sp of players){if(!sp.alive||sp.skin==='none')continue;const sc=getMaxCell(sp);if(!sc||sc.radius<15)continue;const sr=sc.radius,scl=Math.min(3,sr/25),ps=Math.min(2,sr/30),vs=Math.min(1.5,sr/30);
    if(sp.skin==='phoenix'&&Math.random()<.12*scl){const a=Math.random()*Math.PI*2;particles.push({x:sc.x+Math.cos(a)*sr*.6,y:sc.y+Math.sin(a)*sr*.6,vx:Math.cos(a)*(rand(.5,1.5)*vs)+rand(-.3,.3),vy:Math.sin(a)*(rand(.5,1.5)*vs)+rand(-.3,.3),radius:rand(1,3)*ps,color:`hsl(${randI(20,40)},100%,${randI(50,80)}%)`,life:rand(.6,1),decay:.012})}
    if(sp.skin==='thunder'&&Math.random()<.08*scl){const a=Math.random()*Math.PI*2;particles.push({x:sc.x+Math.cos(a)*sr*.7,y:sc.y+Math.sin(a)*sr*.7,vx:Math.cos(a)*rand(1,3)*vs,vy:Math.sin(a)*rand(1,3)*vs,radius:rand(1,2.5)*ps,color:`hsl(${randI(180,220)},100%,${randI(60,90)}%)`,life:rand(.3,.6),decay:.03})}
    if(sp.skin==='angel'&&Math.random()<.06*scl){const a=Math.random()*Math.PI*2;particles.push({x:sc.x+Math.cos(a)*sr*.8,y:sc.y+Math.sin(a)*sr*.8,vx:Math.cos(a)*rand(.2,.6)*vs,vy:Math.sin(a)*rand(.2,.6)*vs-rand(.3,.8),radius:rand(1,2)*ps,color:`hsla(${randI(40,50)},80%,${randI(70,95)}%,.6)`,life:rand(.4,.7),decay:.025})}
    if(sp.skin==='demon'&&Math.random()<.1*scl){const a=Math.random()*Math.PI*2;particles.push({x:sc.x+Math.cos(a)*sr*.5,y:sc.y+Math.sin(a)*sr*.5,vx:Math.cos(a)*rand(-.5,.5)*vs,vy:Math.sin(a)*rand(-.5,.5)*vs,radius:rand(2,5)*ps,color:'rgba(120,20,180,.5)',life:rand(.5,.8),decay:.018})}
    if(sp.skin==='mech'&&Math.random()<.1*scl){const a=Math.random()*Math.PI*2;particles.push({x:sc.x+Math.cos(a)*sr*.6,y:sc.y+Math.sin(a)*sr*.6,vx:Math.cos(a)*rand(-1,1)*vs,vy:Math.sin(a)*rand(-1,1)*vs-rand(.5,1.5),radius:rand(1,2)*ps,color:`hsl(${randI(20,40)},100%,${randI(50,70)}%)`,life:rand(.3,.5),decay:.04})}
    if(sp.skin==='aurora'&&Math.random()<.12*scl){const a=Math.random()*Math.PI*2,hue=(frameCount*2+randI(0,60))%360;particles.push({x:sc.x+Math.cos(a)*(sr*.3+rand(0,sr*.5)),y:sc.y+Math.sin(a)*(sr*.3+rand(0,sr*.5)),vx:Math.cos(a)*rand(.1,.4)*vs+rand(-.2,.2),vy:Math.sin(a)*rand(.1,.4)*vs+rand(-.2,.2),radius:rand(2,5)*ps,color:`hsla(${hue},80%,60%,.3)`,life:rand(.5,1),decay:.015})}
    if(sp.skin==='stellar'&&Math.random()<.07*scl){const a=Math.random()*Math.PI*2;particles.push({x:sc.x+Math.cos(a)*sr*.6,y:sc.y+Math.sin(a)*sr*.6,vx:Math.cos(a)*rand(-.8,.8)*vs,vy:Math.sin(a)*rand(-.8,.8)*vs,radius:rand(.5,1.5)*ps,color:`rgba(255,255,200,${rand(.5,.8)})`,life:rand(.5,.8),decay:.025})}
    if(sp.skin==='ghost'&&Math.random()<.08*scl){const a=Math.random()*Math.PI*2;particles.push({x:sc.x+Math.cos(a)*sr*.7,y:sc.y+Math.sin(a)*sr*.7,vx:Math.cos(a)*rand(-.3,.3)*vs,vy:Math.sin(a)*rand(-.3,.3)*vs-rand(.1,.3),radius:rand(3,6)*ps,color:'rgba(180,210,255,.15)',life:rand(.6,1),decay:.01})}
  }
  for(const sf of superFoods)sf.pulse+=.03;
  draw();demoId=requestAnimationFrame(demoLoop);
}

// ============ BGM ============
function startBGM(){
  if(!bgmCtx){
    try{
      bgmCtx=new(window.AudioContext||window.webkitAudioContext)();
      const m=bgmCtx.createGain();m.gain.value=.1;m.connect(bgmCtx.destination);bgmGain=m;
      // pad: Am chord (A3+C4+E4) with gentle tremolo
      const p1=bgmCtx.createOscillator();p1.type='sine';p1.frequency.value=219;
      const p2=bgmCtx.createOscillator();p2.type='sine';p2.frequency.value=261.5;
      const p3=bgmCtx.createOscillator();p3.type='sine';p3.frequency.value=329;
      const pg=bgmCtx.createGain();pg.gain.value=.15;
      const pt=bgmCtx.createOscillator();pt.type='sine';pt.frequency.value=.3;
      const ptg=bgmCtx.createGain();ptg.gain.value=.1;
      pt.connect(ptg);ptg.connect(pg.gain);
      p1.connect(pg);p2.connect(pg);p3.connect(pg);pg.connect(m);
      pt.start();p1.start();p2.start();p3.start();
      // bass: A2 with rhythmic pulse
      const b1=bgmCtx.createOscillator();b1.type='triangle';b1.frequency.value=109.5;
      const bg=bgmCtx.createGain();bg.gain.value=0;
      const bl=bgmCtx.createOscillator();bl.type='square';bl.frequency.value=1.7;
      const blg=bgmCtx.createGain();blg.gain.value=.3;
      bl.connect(blg);blg.connect(bg.gain);
      b1.connect(bg);bg.connect(m);
      bl.start();b1.start();
      // melody: pentatonic chimes (A4-C5-E5-G5-A5) with slow arp
      const a1=bgmCtx.createOscillator();a1.type='triangle';a1.frequency.value=440;
      const ag=bgmCtx.createGain();ag.gain.value=0;
      const al=bgmCtx.createOscillator();al.type='sine';al.frequency.value=3.2;
      const alg=bgmCtx.createGain();alg.gain.value=.06;
      al.connect(alg);alg.connect(ag.gain);
      const al2=bgmCtx.createOscillator();al2.type='sine';al2.frequency.value=.7;
      const alg2=bgmCtx.createGain();alg2.gain.value=180;
      al2.connect(alg2);alg2.connect(a1.frequency);
      a1.connect(ag);ag.connect(m);
      al.start();al2.start();a1.start();
      bgmCtx._nodes=[p1,p2,p3,pt,b1,bl,a1,al,al2];
    }catch(e){return}
  }
  if(bgmCtx.state==='suspended')bgmCtx.resume();
}
function stopBGM(){
  if(!bgmCtx)return;
  try{if(bgmGain)bgmGain.gain.linearRampToValueAtTime(0,bgmCtx.currentTime+.5);
    setTimeout(()=>{if(bgmCtx&&bgmCtx._nodes){bgmCtx._nodes.forEach(n=>{try{n.stop()}catch(e){}});try{bgmCtx.close()}catch(e){}}bgmCtx=null;bgmGain=null},600)}catch(e){}
}

// resume audio context on first user interaction
window.addEventListener('click',()=>startBGM(),{once:true});
window.addEventListener('keydown',()=>startBGM(),{once:true});
window.addEventListener('touchstart',()=>startBGM(),{once:true});

// auto-start demo
startDemo();

// stop demo when starting a real game
const _origStart=startGame;startGame=function(n){stopDemo();_origStart(n)};

// polyfill roundRect
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    if(r>w/2)r=w/2;if(r>h/2)r=h/2;
    this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.quadraticCurveTo(x+w,y,x+w,y+r);
    this.lineTo(x+w,y+h-r);this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    this.lineTo(x+r,y+h);this.quadraticCurveTo(x,y+h,x,y+h-r);
    this.lineTo(x,y+r);this.quadraticCurveTo(x,y,x+r,y);
  };
}
